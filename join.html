<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Join Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800;900&display=swap" rel="stylesheet">
    <style>* { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="h-full flex flex-col items-center justify-center p-6 text-white bg-slate-950 relative overflow-hidden">
    
    <div class="w-full max-w-sm bg-slate-900/80 backdrop-blur-xl border border-white/10 p-6 rounded-3xl shadow-2xl relative z-10">
        <h1 class="text-2xl font-black text-center tracking-wider uppercase mb-1 text-purple-400">Join Session</h1>
        <p class="text-xs text-slate-400 text-center mb-6">Enter details to sync with partner</p>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-extrabold uppercase tracking-widest text-slate-400 mb-1.5">Your Name</label>
                <input type="text" id="friend-name" placeholder="Enter your name" class="w-full bg-slate-950 border border-white/15 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400 font-bold">
            </div>

            <div>
                <label class="block text-[10px] font-extrabold uppercase tracking-widest text-slate-400 mb-1.5">Avatar Image URL</label>
                <input type="text" id="friend-avatar" placeholder="Paste image URL or leave default" value="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150" class="w-full bg-slate-950 border border-white/15 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400 font-bold">
            </div>

            <button onclick="joinSession()" class="w-full mt-4 bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-400 hover:to-indigo-500 text-white font-black py-3.5 rounded-xl shadow-lg shadow-purple-500/25 uppercase tracking-wider text-xs transition-all active:scale-95">
                Connect Now <i class="fa-solid fa-satellite-dish ml-2"></i>
            </button>
        </div>
    </div>

    <script>
        // Smart Location Fetcher (GPS -> IP Fallback)
        async function fetchFriendLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const coords = [pos.coords.longitude, pos.coords.latitude];
                        localStorage.setItem('friendLocation', JSON.stringify(coords));
                    },
                    async () => { await fetchLocationByIP(); },
                    { timeout: 4000 }
                );
            } else {
                await fetchLocationByIP();
            }
        }

        async function fetchLocationByIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.latitude && data.longitude) {
                    localStorage.setItem('friendLocation', JSON.stringify([data.longitude, data.latitude]));
                }
            } catch (e) { console.log("IP fetch error:", e); }
        }

        window.onload = fetchFriendLocation;

        function joinSession() {
            const name = document.getElementById('friend-name').value.trim() || "Partner";
            const avatar = document.getElementById('friend-avatar').value.trim();

            localStorage.setItem('friendName', name);
            localStorage.setItem('animGuestAvatar', avatar);

            window.location.href = 'connecting.html';
        }
    </script>
</body>
</html>
