<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="style.css">
    <title>C&C - Secure Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        .bg-scroll {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/assets/InstallGraphic.png');
            background-size: 200% 100%;
            z-index: -1;
            animation: scrollBg 40s linear infinite;
            filter: brightness(0.3);
        }
        @keyframes scrollBg {
            from { background-position: 100% 50%; }
            to { background-position: 0% 50%; }
        }

        /* Avatar Slide Animations */
        @keyframes slideLeft { 0% { transform: translateX(-200%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { 0% { transform: translateX(200%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .animate-avatar-left { animation: slideLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-avatar-right { animation: slideRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>

<body class="h-[100dvh] text-white p-4 flex flex-col overflow-hidden">
    
    <div id="page-loader">
    <img src="loader-image.png" alt="Loading...">
  </div>
    
    <div class="bg-scroll"></div>

    <div id="join-screen" class="flex-1 flex flex-col justify-center max-w-sm mx-auto w-full gap-4">
        
        <div id="profileBadge" class="flex items-center gap-3 bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 self-center">
            <img id="navAvatar" src="" class="w-8 h-8 rounded-full object-cover border border-white/20">
            <span id="navName" class="text-xs font-bold tracking-wider">...</span>
        </div>

        <h1 class="text-lg font-black uppercase tracking-widest text-rose-400 text-center">Secure Join</h1>
        
        <div id="reader" class="w-full flex-1 bg-black/50 rounded-3xl overflow-hidden border-2 border-white/10 backdrop-blur-sm min-h-[200px]"></div>
        
        <div class="bg-black/30 backdrop-blur-md p-4 rounded-3xl border border-white/10 w-full">
            <input type="number" id="pin-input" placeholder="Enter PIN" class="w-full bg-transparent text-center text-2xl font-black tracking-[0.5em] outline-none placeholder-white/20">
            <button id="connect-btn" class="w-full mt-2 bg-rose-500 py-3 rounded-xl font-bold uppercase text-xs hover:bg-rose-600 transition">Connect Now</button>
        </div>
    </div>
    
    <div id="success-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="flex items-center gap-6">
            <img id="left-avatar" src="" class="animate-avatar-left w-24 h-24 rounded-full border-4 border-white shadow-2xl object-cover opacity-0">
            <h1 class="text-3xl font-black uppercase tracking-widest text-white animate-pulse">Linked!</h1>
            <img id="right-avatar" src="" class="animate-avatar-right w-24 h-24 rounded-full border-4 border-white shadow-2xl object-cover opacity-0">
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI",
            authDomain: "clickandcollect-6c5d4.firebaseapp.com",
            databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "clickandcollect-6c5d4",
            storageBucket: "clickandcollect-6c5d4.firebasestorage.app",
            messagingSenderId: "739076323619",
            appId: "1:739076323619:web:9f75d0012923c0b44bb496",
            measurementId: "G-8V0CJ0ZJVM"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userData = JSON.parse(localStorage.getItem('userData'));
        
        window.onload = () => {
            startScanner();
            if(userData) {
                document.getElementById('navAvatar').src = userData.avatar;
                document.getElementById('navName').innerText = userData.name;
            }
        };
        
        window.verifyAndConnect = async function(pin) {
            const inputPin = pin || document.getElementById('pin-input').value;
            if (!inputPin) { alert("PIN daalo!"); return; }
            
            const roomRef = ref(db, 'rooms/' + inputPin);
            const snapshot = await get(roomRef);
            
            if (snapshot.exists()) {
                // ✅ FIX: Save the pin locally so capture.html / timeline.html can find the room
                localStorage.setItem('cc_room_pin', inputPin);

                // Update Firebase with Status and Guest Avatar
                await update(roomRef, { 
                    status: 'connected',
                    guestAvatar: userData.avatar 
                });
                
                // Start listening to the room for animation trigger
                onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data.status === 'connected') {
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        
                        document.getElementById('left-avatar').src = data.hostAvatar;
                        document.getElementById('right-avatar').src = data.guestAvatar;
                        
                        document.getElementById('join-screen').classList.add('hidden');
                        document.getElementById('success-screen').classList.remove('hidden');
                        
                        setTimeout(() => window.location.href = 'capture.html', 3000);
                    }
                });
            } else {
                alert("❌ Galat PIN!");
            }
        }
        
        document.getElementById('connect-btn').addEventListener('click', () => window.verifyAndConnect());
    </script>
    
    <script>
        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 },
                (decodedText) => {
                    html5QrCode.stop();
                    window.verifyAndConnect(decodedText);
                }
            ).catch(err => {
                console.log("Camera error:", err);
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
