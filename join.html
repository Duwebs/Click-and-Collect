<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C - Join Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-full bg-slate-900 text-white p-6">

    <div class="max-w-sm mx-auto space-y-6">
        <h1 class="text-xl font-black uppercase tracking-widest text-rose-400">Join Friend's Room</h1>
        
        <div id="reader" class="w-full bg-black rounded-3xl overflow-hidden border-2 border-white/10"></div>

        <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Or enter 4-digit PIN</p>
            <input type="number" id="pin-input" placeholder="0000" class="w-full bg-transparent text-center text-3xl font-black tracking-[0.5em] outline-none placeholder:text-white/20">
            <button onclick="connectWithPin()" class="w-full mt-4 bg-rose-500 py-3 rounded-xl font-bold uppercase text-xs shadow-lg shadow-rose-500/20 active:scale-95 transition">Connect Now</button>
        </div>
    </div>

    <script>
        // QR Scanner Setup
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                // QR scan hua toh direct connect
                console.log("PIN found:", decodedText);
                connectRedirect();
            });

        function connectWithPin() {
            const pin = document.getElementById('pin-input').value;
            if (pin.length === 4) connectRedirect();
        }

        function connectRedirect() {
            if (navigator.vibrate) navigator.vibrate(200);
            window.location.href = 'capture.html';
        }
    </script>
</body>
</html>
