<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C - Host Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .bg-scroll {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/assets/InstallGraphic.png');
            background-size: 200% 100%;
            z-index: -1;
            animation: scrollBg 40s linear infinite;
            filter: brightness(0.3);
        }
        @keyframes scrollBg {
            from { background-position: 100% 50%; }
            to { background-position: 0% 50%; }
        }

        /* Avatar Slide Animations */
        @keyframes slideLeft { 0% { transform: translateX(-200%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { 0% { transform: translateX(200%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .animate-avatar-left { animation: slideLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-avatar-right { animation: slideRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="h-full flex flex-col items-center justify-center p-6 text-white overflow-hidden">

    <div class="bg-scroll"></div>

    <div id="wait-screen" class="w-full max-w-sm flex flex-col items-center animate-in fade-in duration-500">
        
        <div id="profileBadge" class="flex items-center gap-4 bg-white/10 backdrop-blur-md px-6 py-3 rounded-full border border-white/10 shadow-xl mb-6">
            <img id="navAvatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-white/20">
            <span id="navName" class="text-base font-bold tracking-wider">...</span>
        </div>

        <h1 class="text-xl font-black uppercase tracking-widest text-teal-400 mb-8">Scan to Connect</h1>
        
        <div id="qr-wrapper" class="relative inline-block mb-8">
            <div id="qrcode" class="bg-white p-4 rounded-3xl shadow-2xl"></div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-14 h-14 rounded-full border-4 border-white bg-white overflow-hidden shadow-xl">
                <img id="qr-avatar" src="" class="w-full h-full object-cover">
            </div>
        </div>
        
        <div class="bg-black/30 backdrop-blur-md w-full py-4 rounded-2xl text-center border border-white/10 mb-6">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Or enter this PIN</p>
            <h2 id="generated-pin" class="text-4xl font-black tracking-[0.2em] text-white">----</h2>
        </div>
        
        <div class="text-teal-400 font-bold text-xs animate-pulse">
            <i class="fas fa-circle-notch fa-spin mr-2"></i> Waiting for partner...
        </div>
    </div>

    <div id="success-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="flex items-center gap-6">
            <img id="left-avatar" src="" class="animate-avatar-left w-24 h-24 rounded-full border-4 border-white shadow-2xl object-cover opacity-0">
            <h1 class="text-3xl font-black uppercase tracking-widest text-white animate-pulse">Linked!</h1>
            <img id="right-avatar" src="" class="animate-avatar-right w-24 h-24 rounded-full border-4 border-white shadow-2xl object-cover opacity-0">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI",
          authDomain: "clickandcollect-6c5d4.firebaseapp.com",
          databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "clickandcollect-6c5d4",
          storageBucket: "clickandcollect-6c5d4.firebasestorage.app",
          messagingSenderId: "739076323619",
          appId: "1:739076323619:web:9f75d0012923c0b44bb496",
          measurementId: "G-8V0CJ0ZJVM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Load User Data
        const userData = JSON.parse(localStorage.getItem('userData'));

        window.onload = () => {
            if(userData) {
                document.getElementById('navAvatar').src = userData.avatar;
                document.getElementById('navName').innerText = userData.name;
                document.getElementById('qr-avatar').src = userData.avatar;
            }
        };

        const pin = Math.floor(1000 + Math.random() * 9000).toString();

        // ✅ FIX: Save the pin locally so capture.html / timeline.html can find the room
        localStorage.setItem('cc_room_pin', pin);

        document.getElementById('generated-pin').textContent = pin;
        new QRCode(document.getElementById("qrcode"), { text: pin, width: 200, height: 200 });

        // Room Create
        set(ref(db, 'rooms/' + pin), { 
            status: 'waiting', 
            hostAvatar: userData.avatar 
        });

        // Connection Listener
        onValue(ref(db, 'rooms/' + pin), (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === 'connected') {
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                
                // Set Avatars
                document.getElementById('left-avatar').src = data.hostAvatar;
                document.getElementById('right-avatar').src = data.guestAvatar;
                
                // UI Switch
                document.getElementById('wait-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                
                // Redirect
                setTimeout(() => window.location.href = 'capture.html', 3000);
            }
        });
    </script>
</body>
</html>
