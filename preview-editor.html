<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Premium Edit Canvas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .rounded-brand-font { font-family: 'Fredoka', sans-serif; }
        
        .premium-bg { 
            background-color: #247e77;
            position: relative;
        }
        
        .content-card-curve { border-top-left-radius: 32px; border-top-right-radius: 32px; }
        
        .skin-active { 
            transform: scale(1.15); 
            box-shadow: 0 0 0 3px rgba(36, 126, 119, 0.4), 0 4px 10px rgba(0,0,0,0.15);
            border-width: 3px !important;
        }
        
        .skin-white { background-color: #ffffff; color: #334155; border-color: #f1f5f9 !important; }
        .skin-pink { background-color: #ffe4e6; color: #9f1239; border-color: #fecdd3 !important; }
        .skin-kraft { background-color: #f4ebd0; color: #5c3d2e; border-color: #e6dac0 !important; }
        .skin-dark { background-color: #121824; color: #f8fafc; border-color: #20293a !important; }
        .skin-lavender { background-color: #f3e8ff; color: #6b21a8; border-color: #e9d5ff !important; }
        .skin-matcha { background-color: #f0fdf4; color: #166534; border-color: #dcfce7 !important; }

        .draggable-sticker {
            position: absolute;
            cursor: move;
            touch-action: none;
            user-select: none;
            z-index: 40;
            padding: 8px;
            border: 1px dashed transparent;
            display: inline-block;
            transform-origin: center center;
        }
        
        .draggable-sticker.selected {
            border-color: #3caea3;
            background: rgba(255,255,255,0.25);
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .sticker-delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 22px;
            height: 22px;
            background: #e64d5c;
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
            z-index: 50;
        }

        .draggable-sticker.selected .sticker-delete-btn {
            display: flex;
        }
    </style>
</head>
<body class="h-full max-h-screen flex flex-col overflow-hidden select-none premium-bg text-white">
    
    <div class="custom-svg-layer absolute inset-0 pointer-events-none opacity-20"></div>

    <header class="h-16 flex items-center justify-between px-4 shrink-0 bg-black/15 backdrop-blur-xl relative z-20 border-b border-white/5">
        <button id="back-guard-trigger" class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center text-white border border-white/10 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </button>
        <div class="text-center flex-1">
            <span class="text-lg font-black tracking-widest text-white rounded-brand-font uppercase block">C&amp;C CANVAS</span>
            <span class="text-[9px] text-teal-200 tracking-wider font-bold uppercase block opacity-80">Studio Mode</span>
        </div>
        <div class="w-10 h-10 opacity-0 pointer-events-none"></div>
    </header>

    <div class="flex-1 flex flex-col overflow-hidden relative z-10">
        <div class="px-6 pt-4 pb-6 flex-1 flex items-center justify-center">
            
            <div id="polaroid-card" class="skin-white p-3 pb-6 rounded-2xl shadow-2xl transform rotate-1 border border-slate-100 max-w-xs w-full relative transition-all">
                <div id="sticker-dropzone" class="aspect-[4/3] w-full rounded-lg overflow-hidden bg-slate-200 relative shadow-inner select-none">
                    <img id="image-preview" src="" alt="Captured Moment" class="w-full h-full object-cover hidden pointer-events-none">
                    <div id="loading-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 space-y-2">
                        <i class="fas fa-spinner animate-spin text-xl"></i>
                        <span class="text-[10px] font-bold tracking-wider">LOADING IMAGE...</span>
                    </div>
                    <div id="active-stickers-layer" class="absolute inset-0 pointer-events-auto overflow-hidden"></div>
                </div>
                <div class="mt-3 flex justify-between items-center px-1">
                    <span id="current-date-stamp" class="text-[10px] font-bold uppercase tracking-wider opacity-60">Today, 11 July 2026</span>
                    <i class="fas fa-heart text-xs text-rose-400"></i>
                </div>
            </div>

        </div>

        <main class="shrink-0 bg-white text-slate-800 content-card-curve p-5 pb-6 shadow-[0_-10px_32px_rgba(0,0,0,0.15)] flex flex-col space-y-4 overflow-y-auto max-h-[46vh] scrollbar-none relative z-20">
            
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block">Tap To Add Sticker</label>
                    <span class="text-[9px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded-md border border-teal-100">Pinch Image to Resize &amp; Rotate!</span>
                </div>
                <div class="flex gap-2.5 overflow-x-auto pb-1 -mx-1 px-1 scrollbar-none">
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">❤️</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">✨</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">🔥</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">😎</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">👑</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">📸</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">🍕</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">🍀</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block">Polaroid Border Palette</label>
                <div class="flex gap-4 items-center overflow-x-auto py-1.5 px-1 scrollbar-none">
                    <button data-skin="skin-white" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-white border-2 border-slate-200 skin-active shadow-sm transition-all"></button>
                    <button data-skin="skin-pink" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-rose-100 border-2 border-rose-200 shadow-sm transition-all"></button>
                    <button data-skin="skin-kraft" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-[#f4ebd0] border-2 border-amber-200 shadow-sm transition-all"></button>
                    <button data-skin="skin-dark" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-slate-900 border-2 border-slate-950 shadow-sm transition-all"></button>
                    <button data-skin="skin-lavender" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-purple-100 border-2 border-purple-200 shadow-sm transition-all"></button>
                    <button data-skin="skin-matcha" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-emerald-50 border-2 border-emerald-100 shadow-sm transition-all"></button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 flex justify-between">
                    <span>Add Caption</span>
                    <span id="char-counter" class="text-slate-300">0/60</span>
                </label>
                <div class="relative flex items-center">
                    <i class="far fa-comment-dots absolute left-3.5 text-slate-400 text-sm"></i>
                    <input type="text" id="caption-input" maxlength="60" placeholder="Write a beautiful memory..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-semibold text-slate-700 focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                </div>
            </div>

            <div class="pt-1">
                <button id="save-memory-btn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black py-4 rounded-xl text-xs tracking-wider uppercase flex items-center justify-center space-x-2 shadow-lg transition active:scale-95 shadow-emerald-500/20">
                    <i class="fas fa-lock text-sm"></i>
                    <span>Lock In Timeline</span>
                </button>
            </div>
        </main>
    </div>

    <div id="back-guard-modal" class="fixed inset-0 z-[600] flex items-center justify-center p-5 invisible opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md"></div>
        <div class="bg-white rounded-3xl p-6 text-center shadow-2xl max-w-xs w-full relative z-10 transform scale-90 transition-all duration-300 text-slate-800">
            <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-amber-500 text-xl shadow-inner">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="text-sm font-black text-slate-900 mb-1 rounded-brand-font uppercase tracking-wide">Discard Memory?</h3>
            <p class="text-[11px] text-slate-400 font-medium leading-relaxed px-1 mb-6">Are you sure you want to go back? Your beautiful edits and custom layouts will be lost.</p>
            <div class="flex gap-3">
                <button id="guard-cancel-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl text-xs uppercase transition">Keep Editing</button>
                <button id="guard-confirm-btn" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl text-xs uppercase transition">Yes, Exit</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 z-[700] flex items-center justify-center p-5 invisible opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md"></div>
        <div id="modal-box" class="bg-white rounded-3xl p-6 text-center shadow-2xl max-w-xs w-full relative z-10 transform scale-90 transition-all duration-300 text-slate-800 border-t-4 border-emerald-500">
            <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-emerald-500 text-3xl shadow-inner">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3 class="text-base font-black text-emerald-600 mb-1 rounded-brand-font uppercase tracking-wide">Locked & Saved!</h3>
            <p class="text-[11px] text-slate-400 font-medium leading-relaxed px-2 mb-6">Incredible! Your customized Polaroid memory has been successfully logged.</p>
            <button id="modal-close-btn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-3 rounded-xl text-xs tracking-wider uppercase shadow-md shadow-emerald-500/20 active:scale-95 transition">
                View Timeline <i class="fas fa-arrow-right ml-1 text-[10px]"></i>
            </button>
        </div>
    </div>

    <script>
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('CC_Memories_DB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('memories')) {
                        db.createObjectStore('memories', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function addMemoryToDB(memory) {
            const db = await initDB();
            const transaction = db.transaction('memories', 'readwrite');
            const store = transaction.objectStore('memories');
            store.add(memory);
        }

        const imgPreview = document.getElementById('image-preview');
        window.addEventListener('DOMContentLoaded', () => {
            const cachedImage = sessionStorage.getItem('recent_memory_image');
            const placeholder = document.getElementById('loading-placeholder');
            if (cachedImage && imgPreview) {
                imgPreview.src = cachedImage;
                imgPreview.classList.remove('hidden');
                if(placeholder) placeholder.remove();
            } else {
                imgPreview.src = "https://images.unsplash.com/photo-1547891654-e66ed7edd96c?auto=format&fit=crop&w=400&q=80";
                imgPreview.classList.remove('hidden');
                if(placeholder) placeholder.remove();
            }
        });

        // --- ACCIDENTAL EXIT BACK GUARD ALERT SYSTEM (FULLY FIXED) ---
        const backTrigger = document.getElementById('back-guard-trigger');
        const guardModal = document.getElementById('back-guard-modal');
        const guardCancel = document.getElementById('guard-cancel-btn');
        const guardConfirm = document.getElementById('guard-confirm-btn');

        // Block internal native back browser navigation layout
        window.history.pushState({ noBackExiting: true }, '');

        window.addEventListener('popstate', (e) => {
            window.history.pushState({ noBackExiting: true }, '');
            showGuardModal();
        });

        function showGuardModal() {
            guardModal.classList.remove('invisible');
            guardModal.classList.add('opacity-100');
        }

        function hideGuardModal() {
            guardModal.classList.add('opacity-0');
            setTimeout(() => guardModal.classList.add('invisible'), 250);
        }

        backTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            showGuardModal();
        });
        
        guardCancel.addEventListener('click', (e) => {
            e.stopPropagation();
            hideGuardModal();
        });
        
        guardConfirm.addEventListener('click', () => { 
            window.location.replace('dashboard.html'); 
        });

        // --- SKINS CODE ---
        const polaroidCard = document.getElementById('polaroid-card');
        const skinBtns = document.querySelectorAll('.skin-btn');
        let activeSkinClass = 'skin-white';

        skinBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                skinBtns.forEach(b => b.classList.remove('skin-active'));
                btn.classList.add('skin-active');
                polaroidCard.className = `p-3 pb-6 rounded-2xl shadow-2xl transform rotate-1 border border-slate-100 max-w-xs w-full relative transition-all ${btn.getAttribute('data-skin')}`;
                activeSkinClass = btn.getAttribute('data-skin');
            });
        });

        // --- TOUCH INTERACTIVE MATRIX CONTROLS ---
        const emojiBtns = document.querySelectorAll('.emoji-selector-btn');
        const stickersLayer = document.getElementById('active-stickers-layer');
        let currentSelectedSticker = null;

        document.getElementById('sticker-dropzone').addEventListener('click', (e) => {
            if(e.target === document.getElementById('sticker-dropzone') || e.target === imgPreview) {
                deselectAllStickers();
            }
        });

        function deselectAllStickers() {
            document.querySelectorAll('.draggable-sticker').forEach(s => s.classList.remove('selected'));
            currentSelectedSticker = null;
        }

        emojiBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                deselectAllStickers();
                
                const sticker = document.createElement('div');
                sticker.className = 'draggable-sticker selected';
                sticker.style.left = '35%';
                sticker.style.top = '35%';
                
                sticker.dataset.scale = 1.2;
                sticker.dataset.angle = 0;
                sticker.style.transform = `scale(1.2) rotate(0deg)`;
                
                const emojiSpan = document.createElement('span');
                emojiSpan.style.fontSize = '36px';
                emojiSpan.style.display = 'inline-block';
                emojiSpan.textContent = btn.textContent;
                sticker.appendChild(emojiSpan);

                const delBtn = document.createElement('div');
                delBtn.className = 'sticker-delete-btn';
                delBtn.innerHTML = '<i class="fas fa-times"></i>';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    sticker.remove();
                    deselectAllStickers();
                });
                sticker.appendChild(delBtn);

                sticker.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deselectAllStickers();
                    sticker.classList.add('selected');
                    currentSelectedSticker = sticker;
                });

                stickersLayer.appendChild(sticker);
                attachAdvancedTouchTrackers(sticker);
                currentSelectedSticker = sticker;
            });
        });

        function attachAdvancedTouchTrackers(elm) {
            let startX = 0, startY = 0;
            let startLeft = 0, startTop = 0;
            let startDistance = 0;
            let startAngle = 0;
            let baseScale = 1.0;
            let baseAngle = 0;

            elm.addEventListener('touchstart', (e) => {
                e.preventDefault();
                deselectAllStickers();
                elm.classList.add('selected');
                currentSelectedSticker = elm;

                baseScale = parseFloat(elm.dataset.scale) || 1.0;
                baseAngle = parseFloat(elm.dataset.angle) || 0;

                if (e.touches.length === 1) {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    startLeft = elm.offsetLeft;
                    startTop = elm.offsetTop;
                } else if (e.touches.length === 2) {
                    startDistance = getTouchDistance(e.touches[0], e.touches[1]);
                    startAngle = getTouchAngle(e.touches[0], e.touches[1]);
                }
            }, { passive: false });

            elm.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const parent = document.getElementById('sticker-dropzone');

                if (e.touches.length === 1 && startX !== 0) {
                    let deltaX = e.touches[0].clientX - startX;
                    let deltaY = e.touches[0].clientY - startY;
                    let nextLeft = startLeft + deltaX;
                    let nextTop = startTop + deltaY;

                    if(nextLeft > -20 && nextLeft < (parent.offsetWidth - 40)) elm.style.left = nextLeft + "px";
                    if(nextTop > -20 && nextTop < (parent.offsetHeight - 40)) elm.style.top = nextTop + "px";
                } 
                else if (e.touches.length === 2) {
                    let currentDistance = getTouchDistance(e.touches[0], e.touches[1]);
                    let currentAngle = getTouchAngle(e.touches[0], e.touches[1]);

                    let scaleFactor = currentDistance / startDistance;
                    let finalScale = Math.min(Math.max(baseScale * scaleFactor, 0.4), 3.0);
                    let finalAngle = baseAngle + (currentAngle - startAngle);

                    elm.dataset.scale = finalScale;
                    elm.dataset.angle = finalAngle;
                    elm.style.transform = `scale(${finalScale}) rotate(${finalAngle}deg)`;
                }
            }, { passive: false });

            elm.addEventListener('touchend', () => { startX = 0; startY = 0; });

            elm.addEventListener('mousedown', (e) => {
                e.preventDefault();
                deselectAllStickers();
                elm.classList.add('selected');
                currentSelectedSticker = elm;
                
                let mX = e.clientX;
                let mY = e.clientY;
                let sL = elm.offsetLeft;
                let sT = elm.offsetTop;

                document.onmousemove = (me) => {
                    let nextL = sL + (me.clientX - mX);
                    let nextT = sT + (me.clientY - mY);
                    elm.style.left = nextL + "px";
                    elm.style.top = nextT + "px";
                };
                document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; };
            });
        }

        function getTouchDistance(t1, t2) {
            return Math.sqrt(Math.pow(t2.clientX - t1.clientX, 2) + Math.pow(t2.clientY - t1.clientY, 2));
        }

        function getTouchAngle(t1, t2) {
            return Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;
        }

        const captionInput = document.getElementById('caption-input');
        const charCounter = document.getElementById('char-counter');
        captionInput.addEventListener('input', (e) => { charCounter.textContent = `${e.target.value.length}/60`; });

        const successModal = document.getElementById('success-modal');
        document.getElementById('save-memory-btn').addEventListener('click', async () => {
            const captionText = captionInput.value.trim() || "A beautiful uncaptioned moment...";
            const newMemory = {
                id: Date.now(),
                image: imgPreview.src,
                caption: captionText,
                tags: ["✨ Polaroid"],
                date: "11 July 2026",
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                skin: activeSkinClass
            };
            try {
                await addMemoryToDB(newMemory);
                successModal.classList.remove('invisible');
                successModal.classList.add('opacity-100');
            } catch (error) { console.error(error); }
        });

        document.getElementById('modal-close-btn').addEventListener('click', () => { window.location.href = 'timeline.html'; });
    </script>
</body>
</html>
