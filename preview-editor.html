<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Edit Memory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .rounded-brand-font { font-family: 'Fredoka', sans-serif; }
        .premium-bg { background: radial-gradient(circle at center, #4fd1c5 0%, #36a39b 70%, #2c8a83 100%); }
        .text-brand-coral { color: #e64d5c; }
        .bg-brand-coral { background-color: #e64d5c; }
        .content-card-curve { border-top-left-radius: 32px; border-top-right-radius: 32px; }
        
        .tag-active { background-color: #e64d5c !important; color: white !important; border-color: #e64d5c !important; transform: scale(1.05); box-shadow: 0 4px 12px rgba(230, 77, 92, 0.2); }
        
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 4px 14px rgba(230, 77, 92, 0.4); } 50% { box-shadow: 0 6px 22px rgba(230, 77, 92, 0.7); } }
        .animate-pulse-glow { animation: pulse-glow 2s infinite ease-in-out; }
        
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    </style>
</head>
<body class="h-full max-h-screen flex flex-col overflow-hidden select-none relative premium-bg text-white">

    <header class="h-14 flex items-center justify-between px-4 shrink-0 bg-transparent relative z-10">
        <a href="dashboard.html" class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center text-white border border-white/20 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </a>
        <div class="flex items-center whitespace-nowrap">
            <span class="text-xl font-bold tracking-wide text-white rounded-brand-font uppercase">C &amp; C</span>
        </div>
        <div class="w-10 h-10 opacity-0"></div>
    </header>

    <div class="flex-1 flex flex-col overflow-hidden relative">
        <div class="px-6 pt-2 pb-6 flex-1 flex items-center justify-center">
            <div class="bg-white p-3 pb-8 rounded-2xl shadow-2xl transform rotate-1 border border-white max-w-xs w-full relative">
                <div class="aspect-[4/3] w-full rounded-lg overflow-hidden bg-slate-100 relative">
                    <img id="image-preview" src="" alt="Captured Moment" class="w-full h-full object-cover hidden">
                    <div id="loading-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 space-y-2">
                        <i class="fas fa-spinner animate-spin text-xl"></i>
                        <span class="text-[10px] font-bold tracking-wider">LOADING IMAGE...</span>
                    </div>
                    <div class="absolute top-2 right-2 bg-black/40 backdrop-blur-md text-white text-[9px] px-2 py-0.5 rounded-full font-semibold tracking-wider">PREVIEW</div>
                </div>
                <div class="mt-3 flex justify-between items-center px-1">
                    <span id="current-date-stamp" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Today, 9 July 2026</span>
                    <i class="fas fa-heart text-xs text-rose-400"></i>
                </div>
            </div>
        </div>

        <main class="animate-slide-up shrink-0 bg-white text-slate-800 content-card-curve p-6 pb-8 shadow-[0_-10px_32px_rgba(0,0,0,0.15)] flex flex-col space-y-5">
            <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 flex justify-between">
                    <span>Add Caption</span>
                    <span id="char-counter" class="text-slate-300">0/60</span>
                </label>
                <div class="relative flex items-center">
                    <i class="far fa-comment-dots absolute left-3.5 text-slate-400 text-sm"></i>
                    <input type="text" id="caption-input" maxlength="60" placeholder="Write a beautiful memory..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-medium text-slate-700 placeholder-slate-400 focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block">Select Vibes / Tags</label>
                <div class="flex overflow-x-auto pb-1 gap-2 -mx-1 px-1 scrollbar-none snap-x">
                    <button class="sticker-tag snap-center shrink-0 text-[11px] font-bold text-slate-600 bg-slate-50 border border-slate-100 px-3.5 py-2 rounded-full transition-all duration-200">❤️ Family</button>
                    <button class="sticker-tag snap-center shrink-0 text-[11px] font-bold text-slate-600 bg-slate-50 border border-slate-100 px-3.5 py-2 rounded-full transition-all duration-200">🎂 Birthday</button>
                    <button class="sticker-tag snap-center shrink-0 text-[11px] font-bold text-slate-600 bg-slate-50 border border-slate-100 px-3.5 py-2 rounded-full transition-all duration-200">🌴 Travel</button>
                    <button class="sticker-tag snap-center shrink-0 text-[11px] font-bold text-slate-600 bg-slate-50 border border-slate-100 px-3.5 py-2 rounded-full transition-all duration-200">✨ Special</button>
                    <button class="sticker-tag snap-center shrink-0 text-[11px] font-bold text-slate-600 bg-slate-50 border border-slate-100 px-3.5 py-2 rounded-full transition-all duration-200">🏡 Home</button>
                </div>
            </div>

            <div class="pt-2">
                <button id="save-memory-btn" class="w-full bg-brand-coral hover:bg-rose-600 text-white font-bold py-3.5 rounded-xl text-xs tracking-wider uppercase flex items-center justify-center space-x-2 shadow-lg transition active:scale-95 animate-pulse-glow">
                    <i class="fas fa-cloud-upload-alt text-sm"></i>
                    <span>Save My Memory</span>
                </button>
            </div>
        </main>
    </div>

    <div id="success-modal" class="fixed inset-0 z-50 flex items-center justify-center p-5 invisible opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div id="modal-box" class="bg-white rounded-2xl p-6 text-center shadow-2xl max-w-xs w-full relative z-10 transform scale-90 transition-all duration-300 text-slate-800">
            <div class="w-14 h-14 bg-rose-50 rounded-xl flex items-center justify-center mx-auto mb-3.5 text-brand-coral text-2xl shadow-inner">
                <i class="fas fa-glass-cheers animate-bounce"></i>
            </div>
            <h3 class="text-sm font-extrabold text-slate-800 mb-1 rounded-brand-font uppercase tracking-wide">Memory Locked!</h3>
            <p class="text-[11px] text-slate-400 font-medium leading-relaxed px-2 mb-5">Hurrah! Your beautiful moment has been customized and locked safely inside C&C.</p>
            <button id="modal-close-btn" class="w-full bg-brand-coral hover:bg-rose-600 text-white font-bold py-3 rounded-xl text-xs tracking-wider uppercase shadow-md shadow-rose-500/20 active:scale-95 transition">
                Awesome!
            </button>
        </div>
    </div>

          <script>
        // --- 🪐 INDEXEDDB HELPER FUNCTIONS ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('CC_Memories_DB', 1);
                
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('memories')) {
                        db.createObjectStore('memories', { keyPath: 'id' });
                    }
                };
                
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function addMemoryToDB(memory) {
            const db = await initDB();
            const transaction = db.transaction('memories', 'readwrite');
            const store = transaction.objectStore('memories');
            store.add(memory);
        }

        // --- 📸 LOAD IMAGE FROM DASHBOARD ---
        window.addEventListener('DOMContentLoaded', () => {
            const cachedImage = sessionStorage.getItem('recent_memory_image');
            const imgPreview = document.getElementById('image-preview');
            const placeholder = document.getElementById('loading-placeholder');
            
            if (cachedImage && imgPreview) {
                imgPreview.src = cachedImage;
                imgPreview.classList.remove('hidden');
                if(placeholder) placeholder.remove();
            } else {
                if(imgPreview) {
                    imgPreview.src = "https://images.unsplash.com/photo-1547891654-e66ed7edd96c?auto=format&fit=crop&w=400&q=80";
                    imgPreview.classList.remove('hidden');
                    if(placeholder) placeholder.remove();
                }
            }
        });

        // --- ✍️ CAPTION COUNTER ---
        const captionInput = document.getElementById('caption-input');
        const charCounter = document.getElementById('char-counter');
        captionInput.addEventListener('input', (e) => {
            const count = e.target.value.length;
            charCounter.textContent = `${count}/60`;
            if (count >= 50) charCounter.classList.replace('text-slate-300', 'text-rose-400');
            else charCounter.classList.replace('text-rose-400', 'text-slate-300');
        });

        // --- 🏷️ TAG SELECTION ---
        const tags = document.querySelectorAll('.sticker-tag');
        tags.forEach(tag => {
            tag.addEventListener('click', () => { tag.classList.toggle('tag-active'); });
        });

        // --- 💾 SAVE MEMORY ACTION ---
        const successModal = document.getElementById('success-modal');
        const modalBox = document.getElementById('modal-box');

        document.getElementById('save-memory-btn').addEventListener('click', async () => {
            const imgPreview = document.getElementById('image-preview');
            const captionText = captionInput.value.trim() || "A beautiful uncaptioned moment...";
            
            const selectedTags = [];
            document.querySelectorAll('.sticker-tag.tag-active').forEach(tag => {
                selectedTags.push(tag.textContent.trim());
            });
            if(selectedTags.length === 0) selectedTags.push("✨ Special");

            // Premium Memory Structure
            const newMemory = {
                id: Date.now(), // Unique ID based on timestamp
                image: imgPreview.src,
                caption: captionText,
                tags: selectedTags,
                date: "9 July 2026",
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            try {
                // Save inside IndexedDB
                await addMemoryToDB(newMemory);
                
                // Show Custom App Modal
                successModal.classList.remove('invisible');
                successModal.classList.add('opacity-100');
                modalBox.classList.remove('scale-90');
                modalBox.classList.add('scale-100');
            } catch (error) {
                console.error("Database Save Error:", error);
                alert("Oops! Memory lock failure.");
            }
        });

        document.getElementById('modal-close-btn').addEventListener('click', () => {
            modalBox.classList.remove('scale-100');
            modalBox.classList.add('scale-90');
            successModal.classList.replace('opacity-100', 'opacity-0');
            
            setTimeout(() => {
                successModal.classList.add('invisible');
                window.location.href = 'timeline.html'; // Redirect to timeline
            }, 250);
        });
    </script>

</body>
</html>
