<!DOCTYPE html>
<html lang="en" class="h-full w-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Immersive Canvas Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .rounded-brand-font { font-family: 'Fredoka', sans-serif; }
        
        .premium-bg { background-color: #247e77; position: relative; }
        .content-card-curve { border-top-left-radius: 32px; border-top-right-radius: 32px; }
        
        .skin-active { 
            transform: scale(1.08); 
            box-shadow: 0 0 0 3px rgba(36, 126, 119, 0.4), 0 4px 10px rgba(0,0,0,0.15);
            border-width: 3px !important;
        }
        
        .skin-white { background-color: #ffffff; color: #334155; border-color: #f1f5f9 !important; }
        .skin-pink { background-color: #ffe4e6; color: #9f1239; border-color: #fecdd3 !important; }
        .skin-kraft { background-color: #f4ebd0; color: #5c3d2e; border-color: #e6dac0 !important; }
        .skin-dark { background-color: #121824; color: #f8fafc; border-color: #20293a !important; }
        .skin-lavender { background-color: #f3e8ff; color: #6b21a8; border-color: #e9d5ff !important; }
        .skin-matcha { background-color: #f0fdf4; color: #166534; border-color: #dcfce7 !important; }

        .draggable-sticker {
            position: absolute;
            cursor: move;
            touch-action: none;
            user-select: none;
            z-index: 40;
            padding: 6px;
            border: 1px dashed transparent;
            display: inline-block;
            transform-origin: center center;
        }
        
        .draggable-sticker.selected {
            border-color: #3caea3;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        .sticker-delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #e64d5c;
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            z-index: 50;
        }

        .draggable-sticker.selected .sticker-delete-btn { display: flex; }
    </style>
</head>
<body class="h-full w-full max-h-screen flex flex-col overflow-hidden select-none premium-bg text-white">

    <header class="h-16 flex items-center justify-between px-4 shrink-0 bg-black/15 backdrop-blur-xl relative z-20 border-b border-white/5">
        <button id="back-guard-trigger" class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center text-white border border-white/10 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </button>
        <div class="text-center flex-1">
            <span class="text-lg font-black tracking-widest text-white rounded-brand-font uppercase block">C&amp;C CANVAS</span>
            <span class="text-[9px] text-teal-200 tracking-wider font-bold uppercase block opacity-80">Studio Mode</span>
        </div>
        <div class="w-10 h-10 opacity-0 pointer-events-none"></div>
    </header>

    <div class="flex-1 flex flex-col overflow-hidden relative z-10">
        <div class="px-6 pt-4 pb-6 flex-1 flex items-center justify-center">
            
            <div id="polaroid-card" class="skin-white p-3 pb-6 rounded-2xl shadow-2xl max-w-xs w-full relative transition-all">
                <div id="sticker-dropzone" class="aspect-[4/3] w-full rounded-lg overflow-hidden bg-slate-200 relative shadow-inner cursor-zoom-in">
                    <img id="image-preview" src="" alt="Captured Moment" class="w-full h-full object-cover hidden pointer-events-none">
                    <div id="loading-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                        <i class="fas fa-spinner animate-spin text-xl"></i>
                    </div>
                    <div id="active-stickers-layer" class="absolute inset-0 pointer-events-auto overflow-hidden"></div>
                </div>
                <div class="mt-3 flex justify-between items-center px-1">
                    <span id="current-date-stamp" class="text-[10px] font-bold uppercase tracking-wider opacity-60">Today, 11 July 2026</span>
                    <i class="fas fa-heart text-xs text-rose-400"></i>
                </div>
            </div>

        </div>

        <main class="shrink-0 bg-white text-slate-800 content-card-curve p-5 pb-6 shadow-[0_-10px_32px_rgba(0,0,0,0.15)] flex flex-col space-y-4 overflow-y-auto max-h-[46vh] scrollbar-none relative z-20">
            
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block">Tap To Add Sticker</label>
                    <span class="text-[9px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded-md">Tap photo for REAL Fullscreen!</span>
                </div>
                <div class="flex gap-2.5 overflow-x-auto pb-1 -mx-1 px-1 scrollbar-none">
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">❤️</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">✨</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">🔥</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">😎</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">👑</button>
                    <button class="emoji-selector-btn text-2xl p-1.5 bg-slate-50 border border-slate-100 rounded-xl active:scale-90 transition-all">📸</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block">Polaroid Border Palette</label>
                <div class="flex gap-4 items-center overflow-x-auto py-1.5 px-1 scrollbar-none">
                    <button data-skin="skin-white" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-white border-2 border-slate-200 skin-active shadow-sm transition-all"></button>
                    <button data-skin="skin-pink" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-rose-100 border-2 border-rose-200 shadow-sm transition-all"></button>
                    <button data-skin="skin-kraft" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-[#f4ebd0] border-2 border-amber-200 shadow-sm transition-all"></button>
                    <button data-skin="skin-dark" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-slate-900 border-2 border-slate-950 shadow-sm transition-all"></button>
                    <button data-skin="skin-lavender" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-purple-100 border-2 border-purple-200 shadow-sm transition-all"></button>
                    <button data-skin="skin-matcha" class="skin-btn w-9 h-9 shrink-0 rounded-full bg-emerald-50 border-2 border-emerald-100 shadow-sm transition-all"></button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 flex justify-between">
                    <span>Add Caption</span>
                    <span id="char-counter" class="text-slate-300">0/60</span>
                </label>
                <div class="relative flex items-center">
                    <i class="far fa-comment-dots absolute left-3.5 text-slate-400 text-sm"></i>
                    <input type="text" id="caption-input" maxlength="60" placeholder="Write a beautiful memory..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-semibold text-slate-700 focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                </div>
            </div>

            <div class="pt-1">
                <button id="save-memory-btn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-4 rounded-xl text-xs tracking-wider uppercase flex items-center justify-center space-x-2 shadow-lg transition active:scale-95 shadow-emerald-500/20">
                    <i class="fas fa-lock text-sm"></i>
                    <span>Lock In Timeline</span>
                </button>
            </div>
        </main>
    </div>

    <div id="big-preview-modal" class="fixed inset-0 w-screen h-screen bg-black flex flex-col hidden z-[9999] opacity-0 transition-opacity duration-300">
        
        <button id="close-preview-btn" class="absolute top-4 left-4 w-12 h-12 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center text-white text-lg z-50 shadow-lg active:scale-90 transition-transform">
            <i class="fas fa-times"></i>
        </button>

        <div class="w-full h-full relative overflow-hidden bg-slate-950">
            <img id="big-image-preview" src="" class="w-full h-full object-cover pointer-events-none">
            
            <div id="big-active-stickers-layer" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            
            <div class="absolute bottom-8 left-0 right-0 px-6 text-center z-40 drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)]">
                <p id="big-caption-sync" class="text-base font-bold tracking-wide text-white break-words drop-shadow-md bg-black/40 inline-block px-4 py-2 rounded-xl backdrop-blur-sm"></p>
            </div>
        </div>
    </div>

    <div id="back-guard-modal" class="fixed inset-0 z-[6000] flex items-center justify-center p-5 invisible opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md"></div>
        <div class="bg-white rounded-3xl p-6 text-center shadow-2xl max-w-xs w-full relative z-10 text-slate-800">
            <h3 class="text-sm font-black text-slate-900 mb-1 uppercase tracking-wide rounded-brand-font">Discard Memory?</h3>
            <p class="text-[11px] text-slate-400 mb-6">Are you sure you want to exit? Changes will be dropped.</p>
            <div class="flex gap-3">
                <button id="guard-cancel-btn" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-xs uppercase">Keep Editing</button>
                <button id="guard-confirm-btn" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl text-xs uppercase">Yes, Exit</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 z-[7000] flex items-center justify-center p-5 invisible opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md"></div>
        <div class="bg-white rounded-3xl p-6 text-center shadow-2xl max-w-xs w-full relative z-10 text-slate-800">
            <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-emerald-500 text-3xl"><i class="fas fa-check-circle"></i></div>
            <h3 class="text-base font-black text-emerald-600 mb-1 uppercase tracking-wide rounded-brand-font">Locked & Saved!</h3>
            <button id="modal-close-btn" class="w-full mt-4 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-3 rounded-xl text-xs uppercase tracking-wider">View Timeline</button>
        </div>
    </div>

    <script>
        // --- DATABASE PROTOCOLS ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('CC_Memories_DB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('memories')) { db.createObjectStore('memories', { keyPath: 'id' }); }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function addMemoryToDB(memory) {
            const db = await initDB();
            const transaction = db.transaction('memories', 'readwrite');
            const store = transaction.objectStore('memories');
            store.add(memory);
        }

        const imgPreview = document.getElementById('image-preview');
        const bigImgPreview = document.getElementById('big-image-preview');

        window.addEventListener('DOMContentLoaded', () => {
            const cachedImage = sessionStorage.getItem('recent_memory_image') || "https://images.unsplash.com/photo-1547891654-e66ed7edd96c?auto=format&fit=crop&w=400&q=80";
            imgPreview.src = cachedImage;
            bigImgPreview.src = cachedImage;
            imgPreview.classList.remove('hidden');
            document.getElementById('loading-placeholder')?.remove();
        });

        // --- ANTI BACK CONTROL HOOKS ---
        const backTrigger = document.getElementById('back-guard-trigger');
        const guardModal = document.getElementById('back-guard-modal');
        const guardCancel = document.getElementById('guard-cancel-btn');
        const guardConfirm = document.getElementById('guard-confirm-btn');

        window.history.pushState({ noBackExiting: true }, '');
        window.addEventListener('popstate', () => { window.history.pushState({ noBackExiting: true }, ''); showGuardModal(); });
        function showGuardModal() { guardModal.classList.remove('invisible', 'opacity-0'); guardModal.classList.add('opacity-100'); }
        function hideGuardModal() { guardModal.classList.add('opacity-0'); setTimeout(() => guardModal.classList.add('invisible'), 250); }
        backTrigger.addEventListener('click', (e) => { e.stopPropagation(); showGuardModal(); });
        guardCancel.addEventListener('click', (e) => { e.stopPropagation(); hideGuardModal(); });
        guardConfirm.addEventListener('click', () => { window.location.replace('dashboard.html'); });

        // --- SKIN SWAPPING UTILS ---
        const polaroidCard = document.getElementById('polaroid-card');
        const skinBtns = document.querySelectorAll('.skin-btn');
        let activeSkinClass = 'skin-white';

        skinBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                skinBtns.forEach(b => b.classList.remove('skin-active'));
                btn.classList.add('skin-active');
                activeSkinClass = btn.getAttribute('data-skin');
                polaroidCard.className = `p-3 pb-6 rounded-2xl shadow-2xl max-w-xs w-full relative transition-all ${activeSkinClass}`;
            });
        });

        // --- SYNC INTERACTION STICKERS TRACKING SYSTEM ---
        const emojiBtns = document.querySelectorAll('.emoji-selector-btn');
        const mainStickersLayer = document.getElementById('active-stickers-layer');
        let stickersArray = [];

        document.addEventListener('click', (e) => {
            if(!e.target.closest('.draggable-sticker') && !e.target.closest('.emoji-selector-btn')) deselectAllStickers();
        });
        function deselectAllStickers() { document.querySelectorAll('.draggable-sticker').forEach(s => s.classList.remove('selected')); }

        emojiBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const uniqueId = Date.now();
                const stickerObj = { id: uniqueId, char: btn.textContent, left: 35, top: 35, scale: 1.2, angle: 0 };
                stickersArray.push(stickerObj);
                spawnCanvasStickerElement(stickerObj);
            });
        });

        function spawnCanvasStickerElement(obj) {
            deselectAllStickers();
            const sticker = document.createElement('div');
            sticker.className = 'draggable-sticker selected';
            sticker.dataset.id = obj.id;
            sticker.style.left = obj.left + '%';
            sticker.style.top = obj.top + '%';
            sticker.style.transform = `scale(${obj.scale}) rotate(${obj.angle}deg)`;

            const span = document.createElement('span');
            span.style.fontSize = '32px';
            span.style.display = 'inline-block';
            span.textContent = obj.char;
            sticker.appendChild(span);

            const delBtn = document.createElement('div');
            delBtn.className = 'sticker-delete-btn';
            delBtn.innerHTML = '<i class="fas fa-times"></i>';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                stickersArray = stickersArray.filter(s => s.id !== obj.id);
                sticker.remove();
            });
            sticker.appendChild(delBtn);

            sticker.addEventListener('click', (e) => { e.stopPropagation(); deselectAllStickers(); sticker.classList.add('selected'); });

            mainStickersLayer.appendChild(sticker);
            attachMobileInteractiveTouchTracks(sticker, obj);
        }

        function attachMobileInteractiveTouchTracks(elm, referenceObj) {
            let startX = 0, startY = 0;
            let startLeft = 0, startTop = 0;
            const parent = document.getElementById('sticker-dropzone');

            elm.addEventListener('touchstart', (e) => {
                deselectAllStickers();
                elm.classList.add('selected');
                if (e.touches.length === 1) {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    startLeft = elm.offsetLeft;
                    startTop = elm.offsetTop;
                }
            }, { passive: true });

            elm.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && startX !== 0) {
                    let nextL = startLeft + (e.touches[0].clientX - startX);
                    let nextT = startTop + (e.touches[0].clientY - startY);

                    if(nextL > -15 && nextL < (parent.offsetWidth - 20)) elm.style.left = nextL + "px";
                    if(nextT > -15 && nextT < (parent.offsetHeight - 20)) elm.style.top = nextT + "px";

                    referenceObj.left = (elm.offsetLeft / parent.offsetWidth) * 100;
                    referenceObj.top = (elm.offsetTop / parent.offsetHeight) * 100;
                }
            }, { passive: true });

            elm.addEventListener('mousedown', (e) => {
                deselectAllStickers(); elm.classList.add('selected');
                let mX = e.clientX, mY = e.clientY, sL = elm.offsetLeft, sT = elm.offsetTop;
                document.onmousemove = (me) => {
                    let nextL = sL + (me.clientX - mX), nextT = sT + (me.clientY - mY);
                    elm.style.left = nextL + "px"; elm.style.top = nextT + "px";
                    referenceObj.left = (elm.offsetLeft / parent.offsetWidth) * 100;
                    referenceObj.top = (elm.offsetTop / parent.offsetHeight) * 100;
                };
                document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; };
            });
        }

        // --- 🚨 FIXED TRUE FULL-BLEED SCREENSHOT PREVIEW MODAL LOGIC ---
        const bigPreviewModal = document.getElementById('big-preview-modal');
        const bigStickersLayer = document.getElementById('big-active-stickers-layer');
        const bigCaptionSync = document.getElementById('big-caption-sync');
        const captionInput = document.getElementById('caption-input');

        document.getElementById('sticker-dropzone').addEventListener('click', (e) => {
            if(e.target.closest('.draggable-sticker')) return;

            // Caption mapping
            bigCaptionSync.textContent = captionInput.value.trim() || "A beautiful uncaptioned memory...";
            bigStickersLayer.innerHTML = ''; 

            // Emojis mapping on full-bleed viewport proportions
            stickersArray.forEach(st => {
                const mirror = document.createElement('div');
                mirror.style.position = 'absolute';
                mirror.style.left = st.left + '%';
                mirror.style.top = st.top + '%';
                mirror.style.transform = `scale(${st.scale * 1.3}) rotate(${st.angle}deg)`; // Slightly bigger for full screen scaling
                mirror.innerHTML = `<span style="font-size:38px; display:inline-block; user-select:none;">${st.char}</span>`;
                bigStickersLayer.appendChild(mirror);
            });

            bigPreviewModal.classList.remove('hidden');
            setTimeout(() => { bigPreviewModal.classList.add('opacity-100'); }, 10);
        });

        document.getElementById('close-preview-btn').addEventListener('click', () => {
            bigPreviewModal.classList.remove('opacity-100');
            setTimeout(() => { bigPreviewModal.classList.add('hidden'); }, 300);
        });

        // --- SUBMIT SAVE PIPELINE ---
        const successModal = document.getElementById('success-modal');
        document.getElementById('save-memory-btn').addEventListener('click', async () => {
            const payloadStickers = stickersArray.map(s => ({ id: s.id, char: s.char, left: s.left, top: s.top, scale: s.scale, angle: s.angle }));
            
            const newMemory = {
                id: Date.now(),
                image: imgPreview.src,
                caption: captionInput.value.trim() || "A beautiful uncaptioned moment...",
                tags: ["✨ Polaroid"],
                date: "11 July 2026",
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                skin: activeSkinClass,
                stickers: payloadStickers 
            };
            try {
                await addMemoryToDB(newMemory);
                successModal.classList.remove('invisible', 'opacity-0'); successModal.classList.add('opacity-100');
            } catch (err) { console.error(err); }
        });

        document.getElementById('modal-close-btn').addEventListener('click', () => { window.location.href = 'timeline.html'; });
        captionInput.addEventListener('input', (e) => { document.getElementById('char-counter').textContent = `${e.target.value.length}/60`; });
    </script>
</body>
</html>
