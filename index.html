<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="msapplication-config" content="assets/browserconfig.xml">

    <title>Click & Collect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    
<link rel="apple-touch-icon" sizes="57x57" href="assets/apple-icon-57x57.png">
<link rel="apple-touch-icon" sizes="60x60" href="assets/apple-icon-60x60.png">
<link rel="apple-touch-icon" sizes="72x72" href="assets/apple-icon-72x72.png">
<link rel="apple-touch-icon" sizes="76x76" href="assets/apple-icon-76x76.png">
<link rel="apple-touch-icon" sizes="114x114" href="assets/apple-icon-114x114.png">
<link rel="apple-touch-icon" sizes="120x120" href="assets/apple-icon-120x120.png">
<link rel="apple-touch-icon" sizes="144x144" href="assets/apple-icon-144x144.png">
<link rel="apple-touch-icon" sizes="152x152" href="assets/apple-icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-icon-180x180.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/android-icon-192x192.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="manifest" href="assets/manifest.json">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="assets/ms-icon-144x144.png">
<meta name="theme-color" content="#ffffff">


    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
        .font-logo { font-family: 'Fredoka', sans-serif; }

        @keyframes ambient-shift { 0%, 100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(10deg); } }
        .premium-bg { background: radial-gradient(circle at center, #4fd1c5 0%, #36a39b 70%, #2c8a83 100%); animation: ambient-shift 6s ease-in-out infinite; will-change: filter; }

        @keyframes shine-swipe { 0% { transform: translateX(-100%) skewX(-15deg); } 25%, 100% { transform: translateX(200%) skewX(-15deg); } }
        .animate-shine { animation: shine-swipe 4s infinite linear; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /*
          Original animation technique, unchanged: reveal by animating `width`
          from 0 up to a fixed value and back down, same timing/easing as
          before. The ONLY problem was that 3.5rem / 5.2rem were sized for the
          mobile text-3xl font only, so at the larger sm:text-4xl desktop size
          the same widths came up short and "Collect" got clipped.
          Fix: keep the base (mobile) keyframes exactly as they were, and add
          a min-width:640px override with the SAME keyframes scaled by the
          same ratio the font itself grows by at that breakpoint
          (text-4xl / text-3xl = 36px / 30px = 1.2x). Same animation, same
          feel, just proportioned correctly for the bigger text.
        */
        @keyframes reveal-unreal-lick { 0% { width: 0; opacity: 0; margin-left: 0; } 15%, 65% { width: 3.5rem; opacity: 1; margin-left: 2px; } 80%, 100% { width: 0; opacity: 0; margin-left: 0; } }
        @keyframes reveal-unreal-ollect { 0% { width: 0; opacity: 0; margin-left: 0; } 15%, 65% { width: 5.2rem; opacity: 1; margin-left: 2px; } 80%, 100% { width: 0; opacity: 0; margin-left: 0; } }
        @keyframes tagline-unreal { 0% { opacity: 0; transform: translateY(10px); } 15%, 60% { opacity: 0.85; transform: translateY(0); } 75%, 100% { opacity: 0; transform: translateY(-5px); } }

        .reveal-click { display: inline-block; width: 0; opacity: 0; overflow: hidden; vertical-align: bottom; white-space: nowrap; animation: reveal-unreal-lick 3.4s cubic-bezier(0.77, 0, 0.175, 1) forwards; animation-delay: 1.4s; }
        .reveal-collect { display: inline-block; width: 0; opacity: 0; overflow: hidden; vertical-align: bottom; white-space: nowrap; animation: reveal-unreal-ollect 3.4s cubic-bezier(0.77, 0, 0.175, 1) forwards; animation-delay: 1.4s; }
        .animate-tagline { opacity: 0; animation: tagline-unreal 3.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 1.4s; }

        /* Desktop-only width override (font grows via sm:text-4xl at 640px+).
           Full keyframes must be repeated here because a @keyframes rule with
           the same name fully replaces the earlier one when its media query
           matches — it does not merge with the base keyframes above. */
        @media (min-width: 640px) {
            @keyframes reveal-unreal-lick { 0% { width: 0; opacity: 0; margin-left: 0; } 15%, 65% { width: 4.2rem; opacity: 1; margin-left: 2px; } 80%, 100% { width: 0; opacity: 0; margin-left: 0; } }
            @keyframes reveal-unreal-ollect { 0% { width: 0; opacity: 0; margin-left: 0; } 15%, 65% { width: 6.24rem; opacity: 1; margin-left: 2px; } 80%, 100% { width: 0; opacity: 0; margin-left: 0; } }
        }

        .premium-text { color: #ffffff; text-shadow: 0 2px 10px rgba(255,255,255,0.2); }
        @keyframes float-card { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .animate-float { animation: float-card 3s infinite ease-in-out; }
        @keyframes heartbeat { 0%, 100%, 60% { transform: scale(1); } 20% { transform: scale(1.2); } 40% { transform: scale(1.08); } }
        .animate-heart { animation: heartbeat 1.6s infinite ease-in-out; }

        /* Desktop / larger-viewport friendliness: keep the mobile layout intact
           but let it breathe instead of staying pinned to a narrow mobile width. */
        @media (min-width: 640px) {
            .splash-wrap { max-width: 32rem; }
            .splash-icon { width: 6.5rem; height: 6.5rem; }
        }
    </style>
</head>
<body class="premium-bg flex flex-col items-center justify-center text-white relative select-none p-4">

    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <i class="fas fa-star absolute top-[10%] left-[12%] text-[9px] opacity-10 animate-pulse"></i>
        <i class="fas fa-star absolute top-[12%] right-[15%] text-[10px] opacity-20 animate-pulse" style="animation-delay: 0.5s"></i>
        <i class="fas fa-star absolute bottom-[28%] right-[12%] text-[10px] opacity-15 animate-pulse"></i>
    </div>

    <div class="splash-wrap text-center flex flex-col items-center animate-fade-in w-full max-w-sm z-10">
        <div class="splash-icon animate-float relative inline-block mb-6 w-24 h-24">
            <div class="w-full h-full bg-white/10 backdrop-blur-xl rounded-3xl flex items-center justify-center shadow-[0_8px_32px_0_rgba(0,0,0,0.12)] border border-white/20 relative overflow-hidden">
                <i class="fas fa-camera text-5xl text-white drop-shadow-sm"></i>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -skew-x-12 animate-shine"></div>
            </div>
            <div class="animate-heart absolute -top-1.5 -right-1.5 bg-white w-7 h-7 rounded-full flex items-center justify-center shadow-md border border-teal-50/20 z-20">
                <i class="fas fa-heart text-xs text-[#E14D57]"></i>
            </div>
        </div>
        
        <h1 class="font-logo text-3xl sm:text-4xl font-bold tracking-wide mb-3 drop-shadow-sm premium-text flex items-center justify-center">
            <span class="inline-flex items-center justify-start"><span>C</span><span class="reveal-click text-left text-teal-100">lick</span></span>
            <span class="mx-2 opacity-85">&amp;</span>
            <span class="inline-flex items-center justify-start"><span>C</span><span class="reveal-collect text-left text-teal-100">ollect</span></span>
        </h1>
        
        <p class="animate-tagline text-[10.5px] text-teal-50/90 font-medium tracking-[0.15em] max-w-[280px] leading-relaxed uppercase">
            Treasuring Family Moments, Forever
        </p>
    </div>

    <div class="absolute bottom-12 sm:bottom-16 flex flex-col items-center space-y-3.5 w-full px-6">
        <div class="flex items-center space-x-1.5 bg-black/10 backdrop-blur-sm px-3.5 py-2 rounded-full border border-white/5">
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></div>
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
        <p id="loading-status" class="text-[10px] text-teal-50/70 font-semibold uppercase tracking-widest min-h-[14px] transition-opacity duration-200">
            Connecting to secure vault...
        </p>
    </div>
    
    

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const statusText = document.getElementById("loading-status");

            // Initial status
            setTimeout(() => {
                statusText.style.opacity = "0";
                setTimeout(() => {
                    statusText.innerText = "Encrypting family memory lanes...";
                    statusText.style.opacity = "1";
                }, 200);
            }, 1500);

            // Unlock status
            setTimeout(() => {
                statusText.style.opacity = "0";
                setTimeout(() => {
                    statusText.innerText = "Vault Unlocked. Loading Memories...";
                    statusText.style.opacity = "1";
                }, 200);
            }, 3500);

            // Final Redirect
            setTimeout(() => { window.location.href = "dashboard.html"; }, 4650);
        });
    </script>
    

<script src="script.js"></script>


</body>
</html>
