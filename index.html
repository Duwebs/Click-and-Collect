<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome to Click & Collect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Inter', sans-serif;
        }
        .font-logo { font-family: 'Fredoka', sans-serif; }

        /* Fluid Morphing Background */
        @keyframes ambient-shift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(10deg); }
        }
        .premium-bg {
            background: radial-gradient(circle at center, #4fd1c5 0%, #36a39b 70%, #2c8a83 100%);
            animation: ambient-shift 6s ease-in-out infinite;
        }

        /* Camera Shine Effect */
        @keyframes shine-swipe {
            0% { transform: translateX(-100%) skewX(-15deg); }
            25%, 100% { transform: translateX(200%) skewX(-15deg); }
        }
        .animate-shine { animation: shine-swipe 4s infinite linear; }

        /* Logo Card Entry */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 🔄 CINEMATIC REVERSE (REVEAL -> HOLD -> UNREAL) ANIMATIONS */
        @keyframes reveal-unreal-lick {
            0% { width: 0; opacity: 0; margin-left: 0; }
            15%, 65% { width: 3.5rem; opacity: 1; margin-left: 2px; }
            80%, 100% { width: 0; opacity: 0; margin-left: 0; }
        }
        @keyframes reveal-unreal-ollect {
            0% { width: 0; opacity: 0; margin-left: 0; }
            15%, 65% { width: 5.2rem; opacity: 1; margin-left: 2px; }
            80%, 100% { width: 0; opacity: 0; margin-left: 0; }
        }
        @keyframes tagline-unreal {
            0% { opacity: 0; transform: translateY(10px); }
            15%, 60% { opacity: 0.85; transform: translateY(0); }
            75%, 100% { opacity: 0; transform: translateY(-5px); }
        }

        .reveal-click {
            display: inline-block; width: 0; opacity: 0; overflow: hidden;
            vertical-align: bottom; white-space: nowrap;
            animation: reveal-unreal-lick 3.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            animation-delay: 1.4s;
        }

        .reveal-collect {
            display: inline-block; width: 0; opacity: 0; overflow: hidden;
            vertical-align: bottom; white-space: nowrap;
            animation: reveal-unreal-ollect 3.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            animation-delay: 1.4s;
        }

        .animate-tagline {
            opacity: 0; animation: tagline-unreal 3.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 1.4s;
        }

        .premium-text { color: #ffffff; text-shadow: 0 2px 10px rgba(255,255,255,0.2); }

        /* Floating Loops */
        @keyframes float-card {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: float-card 3s infinite ease-in-out; }

        @keyframes heartbeat {
            0%, 100%, 60% { transform: scale(1); }
            20% { transform: scale(1.2); }
            40% { transform: scale(1.08); }
        }
        .animate-heart { animation: heartbeat 1.6s infinite ease-in-out; }
    </style>
</head>
<body class="premium-bg flex flex-col items-center justify-center text-white relative select-none p-4">

    <!-- Stars Backdrop -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <i class="fas fa-star absolute top-[10%] left-[12%] text-[9px] opacity-10 animate-pulse"></i>
        <i class="fas fa-star absolute top-[12%] right-[15%] text-[10px] opacity-20 animate-pulse" style="animation-delay: 0.5s"></i>
        <i class="fas fa-star absolute bottom-[28%] right-[12%] text-[10px] opacity-15 animate-pulse"></i>
    </div>

    <!-- Main Branding Frame -->
    <div class="text-center flex flex-col items-center animate-fade-in w-full max-w-sm z-10">
        
        <!-- Original Camera Floating Box with Heart Badge -->
        <div class="animate-float relative inline-block mb-6">
            <div class="w-24 h-24 bg-white/10 backdrop-blur-xl rounded-3xl flex items-center justify-center shadow-[0_8px_32px_0_rgba(0,0,0,0.12)] border border-white/20 relative overflow-hidden">
                <i class="fas fa-camera text-5xl text-white drop-shadow-sm"></i>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -skew-x-12 animate-shine"></div>
            </div>
            
            <div class="animate-heart absolute -top-1.5 -right-1.5 bg-white w-7 h-7 rounded-full flex items-center justify-center shadow-md border border-teal-50/20 z-20">
                <i class="fas fa-heart text-xs text-[#E14D57]"></i>
            </div>
        </div>
        
        <!-- Reversing Logo Title -->
        <h1 class="font-logo text-3xl sm:text-4xl font-bold tracking-wide mb-3 drop-shadow-sm premium-text flex items-center justify-center">
            <span class="inline-flex items-center justify-start">
                <span>C</span><span class="reveal-click text-left text-teal-100">lick</span>
            </span>
            <span class="mx-2 opacity-85">&amp;</span>
            <span class="inline-flex items-center justify-start">
                <span>C</span><span class="reveal-collect text-left text-teal-100">ollect</span>
            </span>
        </h1>
        
        <p class="animate-tagline text-[10.5px] text-teal-50/90 font-medium tracking-[0.15em] max-w-[280px] leading-relaxed uppercase">
            Treasuring Family Moments, Forever
        </p>
    </div>

    <!-- Loader Info -->
    <div class="absolute bottom-12 sm:bottom-16 flex flex-col items-center space-y-3.5 w-full px-6">
        <div class="flex items-center space-x-1.5 bg-black/10 backdrop-blur-sm px-3.5 py-2 rounded-full border border-white/5">
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></div>
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
        <p id="loading-status" class="text-[10px] text-teal-50/70 font-semibold uppercase tracking-widest min-h-[14px]">
            Connecting to secure vault...
        </p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const statusText = document.getElementById("loading-status");

            setTimeout(() => {
                statusText.style.opacity = "0";
                setTimeout(() => {
                    statusText.innerText = "Encrypting family memory lanes...";
                    statusText.style.opacity = "1";
                }, 200);
            }, 1500);

            // NO FADE OUT: Deliberately cut clean at the perfect reverse point for seamless morphing takeover
            setTimeout(() => { window.location.href = "dashboard.html"; }, 4650);
        });
    </script>
</body>
</html>
