<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Memories Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .premium-bg { background: radial-gradient(circle at center, #4fd1c5 0%, #36a39b 70%, #2c8a83 100%); }
        .content-card-curve { border-top-left-radius: 32px; border-top-right-radius: 32px; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .timeline-line::before { content: ''; position: absolute; left: 23px; top: 24px; bottom: 24px; width: 2px; background: linear-gradient(to bottom, rgba(79, 209, 197, 0.4) 0%, rgba(226, 232, 240, 0.6) 80%); z-index: 0; }
        .hide-line::before { display: none !important; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden bg-teal-800 text-white">

    <header class="h-14 flex items-center justify-between px-4 shrink-0 z-10">
        <a href="dashboard.html" class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center border border-white/20 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </a>
        <span class="text-xl font-bold uppercase tracking-wide">C & C Feed</span>
        <div class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center text-xs font-black border border-white/20">
            <span id="total-count">0</span>
        </div>
    </header>

    <main id="main-feed-area" class="flex-1 bg-slate-50 text-slate-800 content-card-curve overflow-y-auto p-5 pb-12 relative timeline-line">
        <div class="flex items-center justify-between mb-6 bg-slate-200/60 p-1 rounded-2xl max-w-xs mx-auto sticky top-0 z-20">
            <button id="switch-timeline-view" class="flex-1 text-[11px] py-2.5 rounded-xl font-black uppercase bg-white text-teal-600 shadow-sm flex items-center justify-center gap-2">
                <i class="fas fa-stream text-xs"></i> Timeline
            </button>
            <button id="switch-grid-view" class="flex-1 text-[11px] py-2.5 rounded-xl font-black uppercase text-slate-400 flex items-center justify-center gap-2">
                <i class="fas fa-th-large text-xs"></i> Gallery
            </button>
        </div>

        <div id="timeline-feed-wrapper" class="space-y-6 relative z-10"><div id="timeline-group-container"></div></div>
        <div id="gallery-grid-wrapper" class="grid grid-cols-2 gap-4 hidden z-10"></div>
    </main>

    <script>
        // Init DB
        function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open('CC_Memories_DB', 1);
                request.onsuccess = (e) => resolve(e.target.result);
            });
        }

        async function getAllMemoriesFromDB() {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction('memories', 'readonly');
                const store = tx.objectStore('memories');
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result.sort((a,b) => b.id - a.id));
            });
        }

        async function renderAllLayouts() {
            const groupContainer = document.getElementById('timeline-group-container');
            const gridWrapper = document.getElementById('gallery-grid-wrapper');
            globalMemoriesCache = await getAllMemoriesFromDB();
            document.getElementById('total-count').textContent = globalMemoriesCache.length;

            groupContainer.innerHTML = ''; gridWrapper.innerHTML = '';

            globalMemoriesCache.forEach(m => {
                const tag = m.tag || 'Memory';
                const badgeColor = tag === 'Both' ? 'bg-rose-500' : tag === 'Friend' ? 'bg-purple-500' : 'bg-teal-500';
                
                // Grid View
                gridWrapper.innerHTML += `
                    <div class="bg-white p-2 border rounded-2xl flex flex-col">
                        <div class="absolute z-10 ${badgeColor} text-white font-black text-[8px] px-2 py-0.5 rounded-lg m-2">${tag}</div>
                        <img src="${m.image}" class="aspect-square rounded-xl object-cover">
                    </div>`;

                // Timeline View
                groupContainer.innerHTML += `
                    <div class="bg-white rounded-2xl p-3.5 shadow-sm border space-y-3">
                        <div class="relative rounded-xl overflow-hidden">
                            <img src="${m.image}" class="w-full aspect-[4/3] object-cover">
                            <div class="absolute top-2.5 left-2.5 ${badgeColor} text-white text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest z-10">${tag}</div>
                        </div>
                    </div>`;
            });
        }

        // Switching View Logic
        document.getElementById('switch-grid-view').addEventListener('click', (e) => {
            document.getElementById('timeline-feed-wrapper').classList.add('hidden');
            document.getElementById('gallery-grid-wrapper').classList.remove('hidden');
        });
        document.getElementById('switch-timeline-view').addEventListener('click', (e) => {
            document.getElementById('timeline-feed-wrapper').classList.remove('hidden');
            document.getElementById('gallery-grid-wrapper').classList.add('hidden');
        });

        renderAllLayouts();
    </script>
</body>
</html>
