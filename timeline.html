<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C - Memories Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #f0fdfa 0%, #fdf2f8 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .timeline-line::before { content: ''; position: absolute; left: 24px; top: 20px; bottom: 20px; width: 2px; background: #e2e8f0; }
        .btn-active { background: linear-gradient(135deg, #0d9488 0%, #e11d48 100%) !important; color: white !important; }
        #lightbox { display: none; }
        #lightbox.active { display: flex; }
    </style>
</head>
<body class="h-full gradient-bg text-slate-800 flex flex-col">

    <header class="p-6 flex items-center justify-between">
        <a href="dashboard.html" class="p-3 bg-white shadow-lg rounded-2xl text-teal-600"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-lg font-black uppercase tracking-widest text-teal-800">C & C Feed</h1>
        <div class="w-12 h-12 bg-rose-500 text-white rounded-2xl flex items-center justify-center font-black shadow-lg shadow-rose-500/20" id="total-count">0</div>
    </header>

    <main class="flex-1 overflow-y-auto px-6 pb-20 scrollbar-none">
        <div class="flex p-1 bg-white shadow-inner rounded-2xl mb-8 border border-slate-100">
            <button id="tl-btn" class="btn-active flex-1 py-3 rounded-xl font-black text-xs uppercase transition-all">Timeline</button>
            <button id="gl-btn" class="flex-1 py-3 rounded-xl font-black text-xs uppercase text-slate-400 transition-all">Gallery</button>
        </div>

        <div id="timeline-box" class="timeline-line space-y-8"></div>
        <div id="gallery-box" class="grid grid-cols-2 gap-3 hidden"></div>
    </main>

    <div id="lightbox" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm items-center justify-center p-4" onclick="this.classList.remove('active')">
        <img id="lb-img" src="" class="max-w-full max-h-[85vh] rounded-3xl object-contain border-4 border-white shadow-2xl">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI", authDomain: "clickandcollect-6c5d4.firebaseapp.com", databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "clickandcollect-6c5d4", storageBucket: "clickandcollect-6c5d4.firebasestorage.app", messagingSenderId: "739076323619", appId: "1:739076323619:web:9f75d0012923c0b44bb496", measurementId: "G-8V0CJ0ZJVM" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pin = sessionStorage.getItem('cc_room_pin');
        const myUserId = sessionStorage.getItem('cc_user_id');

        async function loadAllMemories() {
            // 1. Fetch Local Data
            const localData = await new Promise(r => {
                const req = indexedDB.open('CC_Memories_DB', 1);
                req.onsuccess = () => {
                    const tx = req.result.transaction('memories', 'readonly');
                    tx.objectStore('memories').getAll().onsuccess = (e) => r(e.target.result);
                };
                req.onerror = () => r([]);
            });

            // 2. Fetch Firebase & Merge
            if (pin) {
                onValue(ref(db, 'rooms/' + pin + '/memories'), (snapshot) => {
                    const cloudData = snapshot.val();
                    let memoryMap = new Map();

                    // Pehle local data map mein daalo
                    localData.forEach(m => {
                        memoryMap.set(m.id, { image: m.image, time: m.time, id: m.id, tag: m.tag, sender: m.sender });
                    });

                    // Phir cloud data daalo (taaki duplicates remove ho sakein)
                    if (cloudData) {
                        Object.values(cloudData).forEach(m => {
                            memoryMap.set(m.timestamp, { image: m.url, time: m.time, id: m.timestamp, tag: m.tag, sender: m.sender });
                        });
                    }

                    // Smart Filter Logic based on choice
                    let finalFilteredData = Array.from(memoryMap.values()).filter(m => {
                        if (m.tag === 'Me') {
                            return m.sender === myUserId; // Sirf bhejney wale ko dikhe
                        }
                        if (m.tag === 'Friend') {
                            return m.sender !== myUserId; // Sirf samne wale dost ko dikhe, bhejney wale ko nahi!
                        }
                        if (m.tag === 'Both') {
                            return true; // Dono ko dikhe
                        }
                        return true;
                    });

                    renderGallery(finalFilteredData);
                });
            } else {
                renderGallery(localData);
            }
        }

        function renderGallery(data) {
            data.sort((a,b) => b.id - a.id);
            document.getElementById('total-count').textContent = data.length;
            
            const groups = {};
            data.forEach(m => {
                const date = new Date(m.id).toDateString();
                if (!groups[date]) groups[date] = [];
                groups[date].push(m);
            });

            const tlBox = document.getElementById('timeline-box');
            const glBox = document.getElementById('gallery-box');
            tlBox.innerHTML = ''; glBox.innerHTML = '';
            
            Object.entries(groups).forEach(([date, mems]) => {
                tlBox.innerHTML += `<div class="relative pl-10">
                    <div class="absolute left-[20px] top-1 w-2 h-2 bg-rose-500 rounded-full"></div>
                    <div class="text-[10px] font-black text-teal-600 mb-4 uppercase tracking-widest">${date}</div>
                    <div class="space-y-4">` + mems.map(m => `
                        <div class="card-glass p-2 rounded-2xl shadow-sm transition active:scale-95 relative" onclick="openLB('${m.image}')">
                            <div class="absolute z-10 top-4 right-4 bg-black/50 backdrop-blur-md text-white text-[9px] px-2 py-1 rounded-lg font-bold">${m.time || '--:--'}</div>
                            <img src="${m.image}" class="w-full aspect-[4/3] rounded-xl object-cover">
                        </div>`).join('') + `</div></div>`;
                
                mems.forEach(m => glBox.innerHTML += `<img src="${m.image}" onclick="openLB('${m.image}')" class="aspect-square rounded-2xl object-cover shadow-md">`);
            });
        }

        window.openLB = function(src) { document.getElementById('lb-img').src = src; document.getElementById('lightbox').classList.add('active'); }

        document.getElementById('tl-btn').onclick = function() {
            document.getElementById('timeline-box').classList.remove('hidden');
            document.getElementById('gallery-box').classList.add('hidden');
            this.classList.add('btn-active');
            document.getElementById('gl-btn').classList.remove('btn-active');
        };
        
        document.getElementById('gl-btn').onclick = function() {
            document.getElementById('timeline-box').classList.add('hidden');
            document.getElementById('gallery-box').classList.remove('hidden');
            this.classList.add('btn-active');
            document.getElementById('tl-btn').classList.remove('btn-active');
        };

        loadAllMemories();
    </script>
</body>
</html>
