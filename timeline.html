<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="msapplication-config" content="assets/browserconfig.xml">

    <title>C&C - Memories Timeline & Gallery</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="apple-touch-icon" sizes="57x57" href="assets/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="assets/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="assets/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="assets/apple-icon-76x76.png">
    <link class="apple-touch-icon" sizes="114x114" href="assets/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="assets/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="manifest" href="assets/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="assets/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .rounded-brand-font { font-family: 'Fredoka', sans-serif; }
        
        .premium-bg { 
            background: radial-gradient(circle at center, #4fd1c5 0%, #36a39b 70%, #2c8a83 100%); 
        }
        
        .text-brand-coral { color: #e64d5c; }
        .bg-brand-coral { background-color: #e64d5c; }
        .content-card-curve { border-top-left-radius: 32px; border-top-right-radius: 32px; }
        
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        .timeline-line::before {
            content: '';
            position: absolute;
            left: 23px;
            top: 24px;
            bottom: 24px;
            width: 2px;
            background: linear-gradient(to bottom, rgba(79, 209, 197, 0.4) 0%, rgba(226, 232, 240, 0.6) 80%);
            z-index: 0;
        }
        .hide-line::before { display: none !important; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.40s ease-out forwards; }
    </style>
</head>
<body class="h-full max-h-screen flex flex-col overflow-hidden select-none relative premium-bg text-white">

    <header class="h-14 flex items-center justify-between px-4 shrink-0 bg-transparent relative z-10">
        <a href="dashboard.html" class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center text-white border border-white/20 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </a>
        <div class="flex items-center whitespace-nowrap">
            <span class="text-xl font-bold tracking-wide text-white rounded-brand-font uppercase">C &amp; C Feed</span>
        </div>
        <div class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center text-xs font-black border border-white/20 text-teal-100">
            <span id="total-count">0</span>
        </div>
    </header>

    <main id="main-feed-area" class="flex-1 bg-slate-50 text-slate-800 content-card-curve shadow-[0_-10px_32px_rgba(0,0,0,0.15)] overflow-y-auto p-5 pb-12 relative scrollbar-none timeline-line">
        
        <div class="flex items-center justify-between mb-6 bg-slate-200/60 p-1 rounded-2xl border border-slate-300/20 backdrop-blur-sm relative z-20 max-w-xs mx-auto sticky top-0">
            <button id="switch-timeline-view" class="flex-1 text-[11px] py-2.5 rounded-xl font-black uppercase tracking-wider transition-all duration-300 bg-white text-teal-600 shadow-sm flex items-center justify-center gap-2">
                <i class="fas fa-stream text-xs"></i> Timeline
            </button>
            <button id="switch-grid-view" class="flex-1 text-[11px] py-2.5 rounded-xl font-black uppercase tracking-wider transition-all duration-300 text-slate-400 flex items-center justify-center gap-2">
                <i class="fas fa-th-large text-xs"></i> Gallery
            </button>
        </div>

        <div id="timeline-feed-wrapper" class="space-y-6 relative z-10 animate-fade-in">
            <div id="timeline-group-container" class="space-y-8"></div>
        </div>

        <div id="gallery-grid-wrapper" class="grid grid-cols-2 gap-4 relative z-10 hidden pb-12 animate-fade-in"></div>

    </main>

    <div id="image-lightbox-modal" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all duration-300 backdrop-blur-md">
        <button id="close-lightbox" class="absolute top-4 right-4 w-10 h-10 bg-white/10 text-white rounded-full flex items-center justify-center backdrop-blur-md border border-white/20 active:scale-90 transition">
            <i class="fas fa-times text-lg"></i>
        </button>
        <div class="w-full max-w-md p-4 flex flex-col justify-center items-center h-full">
            <img id="lightbox-img" src="" class="max-w-full max-h-[70vh] object-contain rounded-2xl shadow-2xl transform scale-95 transition-transform duration-300 border border-white/10">
            <div class="w-full mt-5 text-center space-y-1.5 px-4">
                <p id="lightbox-caption" class="text-white text-sm font-bold break-words tracking-wide"></p>
                <div class="flex items-center justify-center space-x-2 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                    <i class="far fa-calendar-alt text-[9px]"></i>
                    <span id="lightbox-meta"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('CC_Memories_DB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('memories')) {
                        db.createObjectStore('memories', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getAllMemoriesFromDB() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction('memories', 'readonly');
                const store = transaction.objectStore('memories');
                const request = store.getAll();
                
                request.onsuccess = () => {
                    const sortedData = request.result.sort((a, b) => b.id - a.id);
                    resolve(sortedData);
                };
                request.onerror = () => reject(request.error);
            });
        }

        function getTimelineGroupLabel(timestamp, fallbackDateStr) {
            try {
                const recordDate = new Date(timestamp);
                if (isNaN(recordDate.getTime())) return "Memories";
                
                const today = new Date();
                const yesterday = new Date();
                yesterday.setDate(today.getDate() - 1);

                const isSameDay = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();

                if (isSameDay(recordDate, today)) return "Today";
                if (isSameDay(recordDate, yesterday)) return "Yesterday";

                const oneWeekAgo = new Date();
                oneWeekAgo.setDate(today.getDate() - 7);
                if (recordDate > oneWeekAgo) return "This Week";

                return recordDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            } catch (err) {
                return "Older Memories";
            }
        }

        let globalMemoriesCache = [];

        window.addEventListener('DOMContentLoaded', async () => {
            await renderAllLayouts();

            const switchTimeline = document.getElementById('switch-timeline-view');
            const switchGrid = document.getElementById('switch-grid-view');
            const mainFeedArea = document.getElementById('main-feed-area');
            const timelineWrapper = document.getElementById('timeline-feed-wrapper');
            const gridWrapper = document.getElementById('gallery-grid-wrapper');

            switchGrid.addEventListener('click', () => {
                switchGrid.classList.add('bg-white', 'text-teal-600', 'shadow-sm');
                switchGrid.classList.remove('text-slate-400');
                switchTimeline.classList.remove('bg-white', 'text-teal-600', 'shadow-sm');
                switchTimeline.classList.add('text-slate-400');

                timelineWrapper.classList.add('hidden');
                gridWrapper.classList.remove('hidden');
                mainFeedArea.classList.add('hide-line'); 
            });

            switchTimeline.addEventListener('click', () => {
                switchTimeline.classList.add('bg-white', 'text-teal-600', 'shadow-sm');
                switchTimeline.classList.remove('text-slate-400');
                switchGrid.classList.remove('bg-white', 'text-teal-600', 'shadow-sm');
                switchGrid.classList.add('text-slate-400');

                gridWrapper.classList.add('hidden');
                timelineWrapper.classList.remove('hidden');
                mainFeedArea.classList.remove('hide-line'); 
            });

            // --- 🔍 LIGHTBOX CLOSE EVENTS ---
            const modal = document.getElementById('image-lightbox-modal');
            const modalImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('close-lightbox');

            const closeModal = () => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                modalImg.classList.add('scale-95');
            };

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal || e.target.closest('#close-lightbox')) {
                    closeModal();
                }
            });
        });

        async function renderAllLayouts() {
            const groupContainer = document.getElementById('timeline-group-container');
            const gridWrapper = document.getElementById('gallery-grid-wrapper');
            const totalCountBadge = document.getElementById('total-count');

            try {
                globalMemoriesCache = await getAllMemoriesFromDB();
                totalCountBadge.textContent = globalMemoriesCache.length;

                if (globalMemoriesCache.length > 0) {
                    groupContainer.innerHTML = ''; 
                    gridWrapper.innerHTML = ''; 

                    const groupedTimeline = {};

                    globalMemoriesCache.forEach(memory => {
                        const groupLabel = getTimelineGroupLabel(memory.id, memory.date);
                        if (!groupedTimeline[groupLabel]) {
                            groupedTimeline[groupLabel] = [];
                        }
                        groupedTimeline[groupLabel].push(memory);

                        // GALLERY GRID VIEW
                        const gridItemHTML = `
                            <div class="bg-white p-2 border border-slate-100 rounded-2xl shadow-[0_4px_16px_rgba(0,0,0,0.02)] relative group transition duration-300 transform active:scale-95 flex flex-col">
                                <div class="absolute top-3.5 left-3.5 z-10 bg-teal-500/80 backdrop-blur-md text-white font-black text-[8px] uppercase tracking-wider px-2 py-0.5 rounded-lg shadow-sm">
                                    <i class="far fa-star mr-0.5"></i> Live
                                </div>
                                <div class="aspect-square rounded-xl overflow-hidden bg-slate-50 relative border border-slate-100 cursor-pointer">
                                    <img src="${memory.image}" data-id="${memory.id}" class="open-lightbox-trigger w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
                                </div>
                                <div class="mt-2.5 flex items-center justify-between px-0.5 w-full">
                                    <div class="min-w-0 flex-1 pr-1.5">
                                        <p class="text-[10px] font-bold text-slate-700 truncate">${memory.caption || 'Snap Locker'}</p>
                                        <p class="text-[8px] text-slate-400 font-medium mt-0.5 truncate">${memory.time || ''}</p>
                                    </div>
                                    <button class="like-btn text-slate-200 hover:text-rose-500 transition-all duration-200 active:scale-90 p-1 shrink-0">
                                        <i class="fas fa-heart text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        gridWrapper.innerHTML += gridItemHTML;
                    });

                    // CHRONOLOGICAL TIMELINE STREAM
                    Object.keys(groupedTimeline).forEach(groupTitle => {
                        let groupHeaderHTML = `
                            <div class="timeline-bucket space-y-4">
                                <div class="flex items-center space-x-3 sticky top-[52px] bg-slate-50/90 backdrop-blur-md py-2 z-20">
                                    <div class="w-2.5 h-2.5 rounded-full bg-brand-coral ring-4 ring-rose-100/80 z-10 ml-2"></div>
                                    <span class="text-[10px] font-black uppercase tracking-widest text-teal-600 bg-teal-50/70 border border-teal-100/50 px-2.5 py-0.5 rounded-full shadow-sm">${groupTitle}</span>
                                </div>
                                <div class="pl-8 space-y-5">
                        `;

                        groupedTimeline[groupTitle].forEach(memory => {
                            const tagsHTML = (memory.tags && memory.tags.length > 0) 
                                ? memory.tags.map(tag => `<span class="bg-slate-900/40 backdrop-blur-md text-white text-[8px] px-2.5 py-0.5 rounded-md font-black tracking-wide uppercase border border-white/10 shadow-sm">#${tag}</span>`).join(' ')
                                : `<span class="bg-slate-900/40 backdrop-blur-md text-white text-[8px] px-2.5 py-0.5 rounded-md font-black tracking-wide uppercase border border-white/10 shadow-sm">#Memory</span>`;

                            const capturedAtText = (groupTitle === "Today" || groupTitle === "Yesterday") 
                                ? `${groupTitle} at ${memory.time || ''}` 
                                : `${memory.date || ''} • ${memory.time || ''}`;

                            groupHeaderHTML += `
                                <div class="bg-white rounded-2xl p-3.5 shadow-[0_4px_20px_rgba(0,0,0,0.015)] border border-slate-100 space-y-3 transition duration-300 transform active:scale-[0.99]">
                                    <div class="aspect-[4/3] rounded-xl overflow-hidden bg-slate-50 relative border border-slate-100/80 group cursor-pointer">
                                        <img src="${memory.image}" data-id="${memory.id}" alt="Captured Moment" class="open-lightbox-trigger w-full h-full object-cover transition-transform duration-700 group-hover:scale-102" loading="lazy">
                                        <div class="absolute bottom-2.5 left-2.5 flex flex-wrap gap-1 z-10">
                                            ${tagsHTML}
                                        </div>
                                        <div class="absolute top-2.5 right-2.5 bg-black/30 backdrop-blur-md px-2 py-0.5 rounded-md text-[8px] font-extrabold text-white/90 uppercase tracking-wide">
                                            <i class="far fa-clock mr-1"></i>${memory.time || 'Stored'}
                                        </div>
                                    </div>
                                    <div class="flex justify-between items-start pt-0.5">
                                        <div class="pr-3 flex-1 min-w-0">
                                            <p class="text-xs font-bold text-slate-800 leading-relaxed break-words tracking-wide">${memory.caption || 'No custom caption provided.'}</p>
                                            <div class="flex items-center space-x-1.5 mt-1.5 text-slate-400">
                                                <i class="far fa-calendar-alt text-[9px]"></i>
                                                <span class="text-[9px] font-semibold uppercase tracking-wider">${capturedAtText}</span>
                                            </div>
                                        </div>
                                        <button class="like-btn text-slate-200 hover:text-rose-500 p-1.5 transition duration-200 shrink-0 active:scale-75 ml-1">
                                            <i class="fas fa-heart text-base"></i>
                                        </button>
                                    </div>
                                </div>
                            `;
                        });

                        groupHeaderHTML += `</div></div>`;
                        groupContainer.innerHTML += groupHeaderHTML;
                    });

                } else {
                    const emptyState = `
                        <div class="text-center py-20 text-slate-400 space-y-3 col-span-2 flex flex-col items-center justify-center animate-fade-in">
                            <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300 border border-slate-200/40 shadow-inner mb-2">
                                <i class="fas fa-images text-2xl opacity-40"></i>
                            </div>
                            <h4 class="text-xs font-black text-slate-700 uppercase tracking-wider">No Locked Memories Yet</h4>
                            <p class="text-[10px] font-semibold text-slate-400 max-w-[180px] mx-auto leading-normal">Let's snap your first beautiful moment to kickstart this luxury feed timeline!</p>
                        </div>
                    `;
                    groupContainer.innerHTML = emptyState;
                    gridWrapper.innerHTML = emptyState;
                }
            } catch (error) {
                console.error("Error formatting UI Layouts:", error);
            }
        }

        // --- 🔍 INTERACTIVE DELEGATION FOR LIKE & LIGHTBOX OPEN ---
        document.getElementById('main-feed-area').addEventListener('click', (e) => {
            // 1. LIKE BUTTON INTERACTION
            const likeBtn = e.target.closest('.like-btn');
            if (likeBtn) {
                const icon = likeBtn.querySelector('i');
                if (icon.classList.contains('text-slate-200') || likeBtn.classList.contains('text-slate-200')) {
                    likeBtn.classList.remove('text-slate-200');
                    icon.classList.remove('text-slate-200');
                    likeBtn.classList.add('text-rose-500', 'animate-pop');
                    setTimeout(() => likeBtn.classList.remove('animate-pop'), 300);
                } else {
                    likeBtn.classList.remove('text-rose-500');
                    likeBtn.classList.add('text-slate-200');
                    icon.classList.add('text-slate-200');
                }
                return; // Exit handler
            }

            // 2. FULL VIEW LIGHTBOX INTERACTION
            const imgTrigger = e.target.closest('.open-lightbox-trigger');
            if (imgTrigger) {
                const memoryId = imgTrigger.getAttribute('data-id');
                const memory = globalMemoriesCache.find(m => m.id == memoryId);

                if (memory) {
                    const modal = document.getElementById('image-lightbox-modal');
                    const modalImg = document.getElementById('lightbox-img');
                    const modalCaption = document.getElementById('lightbox-caption');
                    const modalMeta = document.getElementById('lightbox-meta');

                    // Map values cleanly
                    modalImg.src = memory.image;
                    modalCaption.textContent = memory.caption || 'Memory Snap';
                    modalMeta.textContent = `${memory.date || ''} • ${memory.time || ''}`;

                    // Execute smooth scale pop animations
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                    setTimeout(() => {
                        modalImg.classList.remove('scale-95');
                    }, 50);
                }
            }
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
