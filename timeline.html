<!DOCTYPE html>
<html lang="hi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Memories Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #092c28;
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 184, 166, 0.25) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.15) 0px, transparent 50%);
            overscroll-behavior: none;
        }

        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        /* Header Styling */
        .header-glass {
            background: rgba(9, 44, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .icon-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.18); }

        .count-badge {
            background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
            box-shadow: 0 4px 16px rgba(244, 63, 94, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Tab Switcher */
        .tab-wrap {
            background: rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.06);
            padding: 4px;
        }
        .tab-btn {
            transition: color 0.3s ease;
            color: #64748b;
        }
        .tab-btn.active { color: #0f172a; }
        .tab-slider {
            position: absolute;
            top: 4px; bottom: 4px; left: 4px;
            width: calc(50% - 4px);
            background: #ffffff;
            border-radius: 14px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .tab-slider.right { transform: translateX(100%); }

        /* Main Sheet Surface */
        .content-sheet {
            background: #f8fafc;
            border-radius: 32px 32px 0 0;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Timeline Items */
        .tl-rail::before {
            content: '';
            position: absolute;
            left: 21px; top: 12px; bottom: 12px;
            width: 2px;
            background: linear-gradient(180deg, #14b8a6 0%, #f43f5e 100%);
            opacity: 0.35;
        }
        .tl-dot {
            box-shadow: 0 0 0 4px #f8fafc, 0 0 0 7px rgba(20, 184, 166, 0.2);
        }
        .tl-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 4px 16px -2px rgba(15, 23, 42, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tl-card:active {
            transform: scale(0.98);
        }

        /* Fixed Compact Photo Container in Timeline */
        .photo-thumb-container {
            width: 100%;
            height: 220px;
            background-color: #0f172a;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-center: center;
        }

        .photo-thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
        }

        .gl-img {
            aspect-ratio: 1 / 1;
            width: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
        }

        /* Gallery Item */
        .gl-item {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
            transition: transform 0.2s ease;
        }
        .gl-item:active { transform: scale(0.95); }

        /* Lightbox Overlay */
        #lightbox { 
            display: none; 
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        #lightbox.active { 
            display: flex; 
            opacity: 1;
        }
        #lb-img { 
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #lightbox.active #lb-img {
            transform: scale(1);
        }

        /* Skeleton Loader */
        .skel {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 37%, #e2e8f0 63%);
            background-size: 400% 100%;
            animation: skelShine 1.4s ease infinite;
        }
        @keyframes skelShine {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fade-up {
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-full flex items-center justify-center overflow-hidden">

    <!-- Desktop Centered Wrapper Frame -->
    <div class="w-full max-w-lg h-full flex flex-col overflow-hidden relative shadow-2xl">

        <!-- Header -->
        <header class="header-glass sticky top-0 z-30 px-5 pt-5 pb-4 flex items-center justify-between">
            <a href="dashboard.html" class="icon-btn w-11 h-11 rounded-2xl flex items-center justify-center text-white">
                <i class="fas fa-arrow-left text-sm"></i>
            </a>

            <div class="text-center">
                <h1 class="text-white font-extrabold text-xs uppercase tracking-[0.25em]">Memories</h1>
                <p class="text-teal-200/60 text-[10px] font-semibold mt-0.5 tracking-wide">C &amp; C Collection</p>
            </div>

            <div class="count-badge w-11 h-11 rounded-2xl flex items-center justify-center">
                <span id="total-count" class="text-white font-black text-sm">0</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="content-sheet flex-1 flex flex-col overflow-hidden -mt-2">

            <!-- Tabs Switcher -->
            <div class="px-5 pt-5 pb-2">
                <div class="tab-wrap relative flex rounded-2xl h-12">
                    <div id="tab-slider" class="tab-slider"></div>
                    <button id="tl-btn" class="tab-btn active relative z-10 flex-1 font-bold text-xs uppercase tracking-wider">Timeline</button>
                    <button id="gl-btn" class="tab-btn relative z-10 flex-1 font-bold text-xs uppercase tracking-wider">Gallery</button>
                </div>
            </div>

            <!-- Scrollable Feed -->
            <main class="flex-1 overflow-y-auto scrollbar-none px-4 pt-3 pb-24">

                <!-- Skeleton Loading State -->
                <div id="skeleton" class="space-y-5 pt-2">
                    <div class="flex gap-4">
                        <div class="skel w-3.5 h-3.5 rounded-full mt-1.5 shrink-0"></div>
                        <div class="skel flex-1 h-36 rounded-3xl"></div>
                    </div>
                    <div class="flex gap-4">
                        <div class="skel w-3.5 h-3.5 rounded-full mt-1.5 shrink-0"></div>
                        <div class="skel flex-1 h-36 rounded-3xl"></div>
                    </div>
                </div>

                <!-- Feed Boxes -->
                <div id="timeline-box" class="tl-rail relative space-y-5 hidden pl-1"></div>
                <div id="gallery-box" class="grid grid-cols-2 gap-3.5 hidden"></div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden flex-col items-center justify-center text-center pt-20 pb-10">
                    <div class="w-20 h-20 rounded-3xl bg-teal-500/10 flex items-center justify-center mb-4 text-teal-600 border border-teal-500/20">
                        <i class="fas fa-camera-retro text-2xl"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wide">No memories saved</h3>
                    <p class="text-slate-400 text-xs mt-1.5 max-w-[210px] leading-relaxed font-medium">Click or upload photos to save your moments here.</p>
                </div>

            </main>
        </div>

    </div>

    <!-- Lightbox Full-Screen View -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-xl flex flex-col items-center justify-between p-4" onclick="closeLB()">
        <!-- Close Button -->
        <div class="w-full flex justify-end pt-2 pr-2">
            <button class="w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <i class="fas fa-xmark text-lg"></i>
            </button>
        </div>

        <!-- Full Image Display -->
        <div class="flex-1 flex items-center justify-center w-full px-1 my-auto">
            <img id="lb-img" src="" class="max-w-full max-h-[75vh] rounded-2xl object-contain border border-white/10 shadow-2xl">
        </div>

        <!-- High Contrast Dark Info Pill -->
        <div id="lb-info" class="w-auto bg-slate-900/90 backdrop-blur-md rounded-full py-2 px-5 border border-slate-700/80 text-center shadow-xl mb-4">
            <p id="lb-date" class="text-xs font-bold text-slate-100 tracking-wide"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI", 
            authDomain: "clickandcollect-6c5d4.firebaseapp.com", 
            databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "clickandcollect-6c5d4", 
            storageBucket: "clickandcollect-6c5d4.firebasestorage.app", 
            messagingSenderId: "739076323619", 
            appId: "1:739076323619:web:9f75d0012923c0b44bb496", 
            measurementId: "G-8V0CJ0ZJVM" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const pin = localStorage.getItem('cc_room_pin');
        let myUserId = localStorage.getItem('cc_user_id');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('cc_user_id', myUserId);
        }

        // Safe Date Parsing Helper
        function parseAndFormatDate(rawTime) {
            if (!rawTime) {
                const now = new Date();
                return {
                    dateStr: now.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' }),
                    timeStr: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
            }

            let d;
            if (typeof rawTime === 'number') {
                d = new Date(rawTime);
            } else if (typeof rawTime === 'string') {
                if (!isNaN(rawTime) && rawTime.trim() !== '') {
                    d = new Date(Number(rawTime));
                } else {
                    d = new Date(rawTime);
                }
            } else {
                d = new Date(rawTime);
            }

            if (isNaN(d.getTime())) {
                d = new Date();
            }

            const dateStr = d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
            const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return { dateStr, timeStr, timestamp: d.getTime() };
        }

        async function loadAllMemories() {
            const localData = await new Promise(r => {
                const req = indexedDB.open('CC_Memories_DB', 1);
                req.onsuccess = () => {
                    try {
                        const tx = req.result.transaction('memories', 'readonly');
                        tx.objectStore('memories').getAll().onsuccess = (e) => r(e.target.result || []);
                    } catch(err) {
                        r([]);
                    }
                };
                req.onerror = () => r([]);
            });

            if (pin) {
                onValue(ref(db, 'rooms/' + pin + '/memories'), (snapshot) => {
                    const cloudData = snapshot.val();
                    let memoryMap = new Map();

                    localData.forEach(m => {
                        if (m && m.id) memoryMap.set(m.id, m);
                    });
                    
                    if (cloudData) {
                        Object.entries(cloudData).forEach(([key, m]) => {
                            memoryMap.set(key, { 
                                id: key, 
                                image: m.url || m.image, 
                                time: m.time || m.timestamp || m.createdAt, 
                                tag: m.tag || 'Me', 
                                sender: m.sender 
                            });
                        });
                    }

                    let finalData = Array.from(memoryMap.values()).filter(m => {
                        if (m.sender === myUserId) return (m.tag === 'Me' || m.tag === 'Both');
                        return (m.tag === 'Friend' || m.tag === 'Both');
                    });

                    renderGallery(finalData);
                });
            } else {
                renderGallery(localData);
            }
        }

        function tagStyle(tag) {
            if (tag === 'Friend') return { bg: 'rgba(168, 85, 247, 0.1)', color: '#9333ea', label: 'Friend', icon: 'fa-user-group' };
            if (tag === 'Both') return { bg: 'rgba(244, 63, 94, 0.1)', color: '#e11d48', label: 'Both', icon: 'fa-heart' };
            return { bg: 'rgba(20, 184, 166, 0.1)', color: '#0d9488', label: 'Me', icon: 'fa-user' };
        }

        function renderGallery(data) {
            data.sort((a, b) => {
                const timeA = parseAndFormatDate(a.time || a.timestamp || a.createdAt).timestamp;
                const timeB = parseAndFormatDate(b.time || b.timestamp || b.createdAt).timestamp;
                return timeB - timeA;
            });

            document.getElementById('total-count').textContent = data.length;
            document.getElementById('skeleton').classList.add('hidden');

            const tlBox = document.getElementById('timeline-box');
            const glBox = document.getElementById('gallery-box');
            const emptyState = document.getElementById('empty-state');
            tlBox.innerHTML = ''; 
            glBox.innerHTML = '';

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                tlBox.classList.add('hidden');
                glBox.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            const activeTab = document.getElementById('tl-btn').classList.contains('active') ? 'tl' : 'gl';
            if (activeTab === 'tl') tlBox.classList.remove('hidden'); else glBox.classList.remove('hidden');

            data.forEach((m, i) => {
                const { dateStr, timeStr } = parseAndFormatDate(m.time || m.timestamp || m.createdAt);
                const style = tagStyle(m.tag);
                const delay = Math.min(i * 0.04, 0.35);

                const safeImgSrc = m.image;

                // Timeline Item Card
                const tlCard = document.createElement('div');
                tlCard.className = 'relative pl-[44px] fade-up';
                tlCard.style.animationDelay = `${delay}s`;
                tlCard.innerHTML = `
                    <div class="tl-dot absolute left-[15px] top-2.5 w-3.5 h-3.5 rounded-full" style="background:${style.color};"></div>
                    <div class="flex items-center justify-between mb-1.5 pr-1">
                        <span class="text-[10px] font-extrabold uppercase tracking-wider text-slate-400">${dateStr} • ${timeStr}</span>
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wide border" style="background:${style.bg}; color:${style.color}; border-color:${style.color}25;">
                            <i class="fas ${style.icon} text-[8px]"></i>${style.label}
                        </span>
                    </div>
                    <div class="tl-card rounded-2xl overflow-hidden cursor-pointer">
                        <div class="photo-thumb-container">
                            <img src="${safeImgSrc}" class="photo-thumb-img" loading="lazy">
                        </div>
                    </div>
                `;
                tlCard.querySelector('.tl-card').onclick = () => openLB(safeImgSrc, `${dateStr} • ${timeStr} (${style.label})`);
                tlBox.appendChild(tlCard);

                // Gallery Grid Item
                const glCard = document.createElement('div');
                glCard.className = 'gl-item relative rounded-2xl overflow-hidden cursor-pointer fade-up';
                glCard.style.animationDelay = `${delay}s`;
                glCard.innerHTML = `
                    <img src="${safeImgSrc}" class="gl-img" loading="lazy">
                    <div class="absolute top-2 right-2 w-6 h-6 rounded-full flex items-center justify-center border border-white/40 shadow-sm" style="background:${style.color};">
                        <i class="fas ${style.icon} text-[9px] text-white"></i>
                    </div>
                `;
                glCard.onclick = () => openLB(safeImgSrc, `${dateStr} • ${timeStr} (${style.label})`);
                glBox.appendChild(glCard);
            });
        }

        window.openLB = function(src, metaInfo = '') { 
            const lb = document.getElementById('lightbox');
            document.getElementById('lb-img').src = src; 
            document.getElementById('lb-date').textContent = metaInfo;
            lb.classList.add('active'); 
        };

        window.closeLB = function() {
            document.getElementById('lightbox').classList.remove('active');
        };

        const slider = document.getElementById('tab-slider');

        document.getElementById('tl-btn').onclick = function() {
            document.getElementById('timeline-box').classList.remove('hidden');
            document.getElementById('gallery-box').classList.add('hidden');
            this.classList.add('active');
            document.getElementById('gl-btn').classList.remove('active');
            slider.classList.remove('right');
        };
        
        document.getElementById('gl-btn').onclick = function() {
            document.getElementById('timeline-box').classList.add('hidden');
            document.getElementById('gallery-box').classList.remove('hidden');
            this.classList.add('active');
            document.getElementById('tl-btn').classList.remove('active');
            slider.add('right');
        };

        loadAllMemories();
    </script>
    <script src="script.js"></script>
</body>
</html>
