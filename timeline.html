<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="msapplication-config" content="assets/browserconfig.xml">

    <title>C&C - Memories Timeline & Gallery</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="apple-touch-icon" sizes="57x57" href="assets/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="assets/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="assets/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="assets/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="assets/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="assets/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="manifest" href="assets/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="assets/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .rounded-brand-font { font-family: 'Fredoka', sans-serif; }
        .premium-bg { background: radial-gradient(circle at center, #4fd1c5 0%, #36a39b 70%, #2c8a83 100%); }
        .text-brand-coral { color: #e64d5c; }
        .bg-brand-coral { background-color: #e64d5c; }
        .content-card-curve { border-top-left-radius: 32px; border-top-right-radius: 32px; }
        
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        /* Timeline connector lines toggle class */
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(226, 232, 240, 0.8);
            z-index: 0;
        }
        .hide-line::before { display: none !important; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-in-out; }
    </style>
</head>
<body class="h-full max-h-screen flex flex-col overflow-hidden select-none relative premium-bg text-white">

    <header class="h-14 flex items-center justify-between px-4 shrink-0 bg-transparent relative z-10">
        <a href="dashboard.html" class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center text-white border border-white/20 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </a>
        <div class="flex items-center whitespace-nowrap">
            <span class="text-xl font-bold tracking-wide text-white rounded-brand-font uppercase">C &amp; C Feed</span>
        </div>
        <div class="w-10 h-10 bg-white/10 backdrop-blur-xl rounded-xl flex items-center justify-center text-xs font-bold border border-white/20">
            <span id="total-count">0</span>
        </div>
    </header>

    <main id="main-feed-area" class="flex-1 bg-slate-50 text-slate-800 content-card-curve shadow-[0_-10px_32px_rgba(0,0,0,0.15)] overflow-y-auto p-6 relative scrollbar-none timeline-line">
        
        <div class="flex items-center justify-between mb-6 bg-slate-200/50 p-1 rounded-xl border border-slate-300/30 backdrop-blur-sm relative z-20 max-w-xs mx-auto">
            <button id="switch-timeline-view" class="flex-1 text-[11px] py-2 rounded-lg font-extrabold uppercase tracking-wider transition-all bg-white text-teal-600 shadow-sm flex items-center justify-center gap-1.5">
                <i class="fas fa-stream"></i> Timeline
            </button>
            <button id="switch-grid-view" class="flex-1 text-[11px] py-2 rounded-lg font-extrabold uppercase tracking-wider transition-all text-slate-400 flex items-center justify-center gap-1.5">
                <i class="fas fa-th-large"></i> Gallery
            </button>
        </div>

        <div id="timeline-feed-wrapper" class="space-y-8 relative z-10">
            <div id="today-section" class="space-y-4">
                <div class="flex items-center space-x-3 sticky top-0 bg-slate-50 py-1 z-20">
                    <div class="w-2.5 h-2.5 rounded-full bg-brand-coral ring-4 ring-rose-100 z-10 ml-1.5"></div>
                    <span class="text-[11px] font-extrabold uppercase tracking-wider text-slate-400">Your Captured Moments</span>
                </div>
                <div id="dynamic-memory-container" class="hidden pl-8"></div>
            </div>
        </div>

        <div id="gallery-grid-wrapper" class="grid grid-cols-2 gap-3.5 relative z-10 hidden pb-10">
            </div>

    </main>

    <script>
        // --- 🪐 INDEXEDDB SETUP ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('CC_Memories_DB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('memories')) {
                        db.createObjectStore('memories', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getAllMemoriesFromDB() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction('memories', 'readonly');
                const store = transaction.objectStore('memories');
                const request = store.getAll();
                
                request.onsuccess = () => {
                    const sortedData = request.result.sort((a, b) => b.id - a.id);
                    resolve(sortedData);
                };
                request.onerror = () => reject(request.error);
            });
        }

        let globalMemoriesCache = [];

        // --- 📱 ENGINE: LOAD & CHOOSE RENDER TARGETS ---
        window.addEventListener('DOMContentLoaded', async () => {
            await renderAllLayouts();

            // --- 🎛️ LAYOUT SWITCHING LOGIC ---
            const switchTimeline = document.getElementById('switch-timeline-view');
            const switchGrid = document.getElementById('switch-grid-view');
            const mainFeedArea = document.getElementById('main-feed-area');
            const timelineWrapper = document.getElementById('timeline-feed-wrapper');
            const gridWrapper = document.getElementById('gallery-grid-wrapper');

            switchGrid.addEventListener('click', () => {
                // Toggle Button Styling
                switchGrid.classList.add('bg-white', 'text-teal-600', 'shadow-sm');
                switchGrid.classList.remove('text-slate-400');
                switchTimeline.classList.remove('bg-white', 'text-teal-600', 'shadow-sm');
                switchTimeline.classList.add('text-slate-400');

                // Switch DOM layers
                timelineWrapper.classList.add('hidden');
                gridWrapper.classList.remove('hidden');
                mainFeedArea.classList.add('hide-line'); // Hides vertical connector
            });

            switchTimeline.addEventListener('click', () => {
                // Toggle Button Styling
                switchTimeline.classList.add('bg-white', 'text-teal-600', 'shadow-sm');
                switchTimeline.classList.remove('text-slate-400');
                switchGrid.classList.remove('bg-white', 'text-teal-600', 'shadow-sm');
                switchGrid.classList.add('text-slate-400');

                // Switch DOM layers
                gridWrapper.classList.add('hidden');
                timelineWrapper.classList.remove('hidden');
                mainFeedArea.classList.remove('hide-line'); // Shows vertical connector
            });
        });

        async function renderAllLayouts() {
            const dynamicContainer = document.getElementById('dynamic-memory-container');
            const gridWrapper = document.getElementById('gallery-grid-wrapper');
            const totalCountBadge = document.getElementById('total-count');

            try {
                globalMemoriesCache = await getAllMemoriesFromDB();
                totalCountBadge.textContent = globalMemoriesCache.length;

                if (globalMemoriesCache.length > 0) {
                    dynamicContainer.classList.remove('hidden');
                    dynamicContainer.innerHTML = ''; 
                    gridWrapper.innerHTML = ''; 

                    globalMemoriesCache.forEach(memory => {
                        // 1. RENDER TIMELINE CARD VIEW
                        const tagsHTML = memory.tags.map(tag => 
                            `<span class="bg-slate-100 text-slate-600 text-[9px] px-2.5 py-0.5 rounded-full font-bold">${tag}</span>`
                        ).join(' ');

                        const cardHTML = `
                            <div class="bg-white rounded-2xl p-3 shadow-sm border border-slate-100 space-y-3 mb-5 transition transform active:scale-[0.99]">
                                <div class="aspect-[4/3] rounded-xl overflow-hidden bg-slate-100 relative">
                                    <img src="${memory.image}" alt="Memory" class="w-full h-full object-cover">
                                    <div class="absolute bottom-2 left-2 flex flex-wrap gap-1">
                                        ${tagsHTML}
                                    </div>
                                </div>
                                <div class="flex justify-between items-start px-0.5">
                                    <div class="pr-3">
                                        <p class="text-xs font-semibold text-slate-700 leading-snug break-words">${memory.caption}</p>
                                        <span class="text-[9px] text-slate-400 font-medium">${memory.time} • ${memory.date}</span>
                                    </div>
                                    <button class="like-btn text-slate-300 hover:text-rose-500 p-1 transition shrink-0 active:scale-90">
                                        <i class="fas fa-heart text-base"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        dynamicContainer.innerHTML += cardHTML;

                        // 2. RENDER GALLERY GRID VIEW (Square Grid Cards)
                        const gridItemHTML = `
                            <div class="bg-white p-2 border border-slate-100 rounded-2xl shadow-sm relative group transition transform active:scale-95">
                                <div class="absolute top-3 left-3 z-10 bg-teal-500/90 backdrop-blur-md text-white font-black text-[8px] uppercase tracking-wider px-2 py-0.5 rounded-full shadow-sm">Me</div>
                                <div class="aspect-square rounded-xl overflow-hidden bg-slate-100">
                                    <img src="${memory.image}" class="w-full h-full object-cover">
                                </div>
                                <div class="mt-2 flex items-center justify-between px-0.5">
                                    <span class="text-[9px] text-slate-400 font-bold tracking-tight truncate max-w-[80px]">${memory.caption}</span>
                                    <button class="like-btn text-slate-300 hover:text-rose-500 transition active:scale-90">
                                        <i class="fas fa-heart text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        gridWrapper.innerHTML += gridItemHTML;
                    });
                } else {
                    const emptyState = `
                        <div class="text-center py-12 text-slate-400 space-y-2 col-span-2">
                            <i class="fas fa-images text-3xl opacity-30"></i>
                            <p class="text-xs font-medium">No locked memories yet. Let's go snapshot something!</p>
                        </div>
                    `;
                    dynamicContainer.innerHTML = emptyState;
                    gridWrapper.innerHTML = emptyState;
                    dynamicContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error formatting UI Layouts:", error);
            }
        }

        // --- ❤️ DYNAMIC LIKE EVENT BINDING ---
        document.getElementById('main-feed-area').addEventListener('click', (e) => {
            const button = e.target.closest('.like-btn');
            if (!button) return;

            if (button.classList.contains('text-slate-300')) {
                button.classList.remove('text-slate-300');
                button.classList.add('text-rose-500', 'animate-pop');
                setTimeout(() => button.classList.remove('animate-pop'), 300);
            } else {
                button.classList.remove('text-rose-500');
                button.classList.add('text-slate-300');
            }
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
