<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C | Identity Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #38b2ac; --bg: #050505; --surface: #121212; --border: #252525; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            height: 100dvh; 
            width: 100%;
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }

        /* Background - Faster and Reversed (Right to Left) */
        .bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('/assets/InstallGraphic.png'); 
            background-size: 200% 100%; 
            background-position: 100% 50%; /* Start at right */
            z-index: -1; 
            animation: panBg 20s linear infinite; /* Faster speed */
            filter: brightness(0.2); 
        }
        @keyframes panBg { 
            0% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        /* Lifted the whole section up using extra bottom padding */
        .app-shell { 
            width: 100%; 
            max-width: 400px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 25px 25px 50px 25px; /* Added 50px padding-bottom to push content up */
            background: rgba(0,0,0,0.5);
        }

        .top-content { padding-top: 10px; }
        .title-box { padding-bottom: 20px; color: #fff; }
        .hero-section { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .avatar-pod { width: 180px; height: 180px; background: var(--surface); border: 3px solid var(--border); border-radius: 32px; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 20px; }
        .avatar-pod img { width: 85%; height: 85%; object-fit: cover; border-radius: 20px; transition: all 0.4s; }
        .avatar-pod img.move { transform: scale(1.1); opacity: 0.8; }

        .name-input-box { width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: var(--surface); border: 2px solid var(--border); padding: 15px; color: white; border-radius: 16px; outline: none; }
        .shuffle-btn { background: var(--surface); border: 2px solid var(--border); padding: 15px; border-radius: 16px; cursor: pointer; color: white; }

        .selection-strip { height: 90px; background: var(--surface); border-radius: 24px; display: flex; align-items: center; padding: 10px 15px; gap: 10px; overflow-x: auto; border: 2px solid var(--border); }
        .sel-item { width: 60px; height: 60px; background: #1a1a1a; border-radius: 16px; flex-shrink: 0; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 2px solid transparent; }
        .sel-item.active { border-color: var(--neon); transform: scale(1.05); }
        .sel-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; pointer-events: none; }
        .upload-slot { border: 2px dashed var(--border); color: #666; font-size: 20px; flex-shrink: 0; }

        .launch-btn { width: 100%; padding: 18px; background: var(--neon); color: black; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="app-shell">
        <div class="top-content">
            <div class="title-box">
                <h2>Select Your Avatar</h2>
                <p>Define your digital presence</p>
            </div>

            <div class="hero-section">
                <div class="avatar-pod">
                    <img id="mainAvatar" src="/assets/avatar/avatar1.jpg">
                </div>
                
                <div class="name-input-box">
                    <input type="text" id="userName" placeholder="Your Alias...">
                    <button class="shuffle-btn" onclick="randomizeName()">🎲</button>
                </div>
            </div>

            <div class="selection-strip" id="carousel">
                <input type="file" id="fileInput" accept="image/*" hidden onchange="handleUpload(event)">
                <div class="sel-item upload-slot" onclick="document.getElementById('fileInput').click()">+</div>
            </div>
        </div>

        <button class="launch-btn" onclick="goToHub()">ENTER HUB</button>
    </div>

    <script>
        const localAvatars = [
            "/assets/avatar/avatar1.jpg", "/assets/avatar/avatar2.jpg", 
            "/assets/avatar/avatar3.jpg", "/assets/avatar/avatar4.jpg", "/assets/avatar/avatar5.jpg"
        ];

        window.onload = () => {
            localAvatars.forEach(src => addAvatarToUI(src));
            const saved = JSON.parse(localStorage.getItem('myCustomAvatars') || '[]');
            saved.forEach(src => addAvatarToUI(src));
            const firstAvatar = document.querySelector('.sel-item:not(.upload-slot)');
            if (firstAvatar) select(firstAvatar);
        };

        function addAvatarToUI(src) {
            const container = document.getElementById('carousel');
            const div = document.createElement('div');
            div.className = 'sel-item';
            div.onclick = function() { select(this); };
            div.innerHTML = `<img src="${src}">`;
            container.appendChild(div);
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const src = e.target.result;
                    const saved = JSON.parse(localStorage.getItem('myCustomAvatars') || '[]');
                    saved.push(src);
                    localStorage.setItem('myCustomAvatars', JSON.stringify(saved));
                    addAvatarToUI(src);
                    select(document.getElementById('carousel').lastElementChild);
                }
                reader.readAsDataURL(file);
            }
        }

        function select(el) {
            document.querySelectorAll('.sel-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            
            const img = document.getElementById('mainAvatar');
            img.classList.add('move');
            setTimeout(() => {
                img.src = el.querySelector('img').src;
                img.classList.remove('move');
            }, 250);
        }

        const funnyNames = ["PixelPilot", "GhostGlitch", "NeonNomad", "ZenithZest", "OrbitOddity", "VibeViking"];
        function randomizeName() { document.getElementById('userName').value = funnyNames[Math.floor(Math.random() * funnyNames.length)]; }

        function goToHub() {
            let name = document.getElementById('userName').value.trim() || "UserZero";
            localStorage.setItem('userData', JSON.stringify({ name, avatar: document.getElementById('mainAvatar').src }));
            window.location.href = "click-hub.html";
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
