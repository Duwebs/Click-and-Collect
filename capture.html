<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C - Smart Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="h-full bg-black text-white p-4 overflow-hidden">

    <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>

    <div class="absolute bottom-10 left-0 right-0 px-6 z-40">
        <div id="preview-strip" class="flex gap-3 overflow-x-auto pb-4"></div>
        <div class="flex justify-between items-center">
            <button onclick="takePhoto()" class="w-20 h-20 bg-white rounded-full border-8 border-white/20"></button>
            <button id="collect-btn" onclick="showCollector()" class="hidden bg-teal-500 px-8 py-4 rounded-3xl font-black text-sm">COLLECT IT</button>
        </div>
    </div>

    <div id="collector-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <div class="glass w-full rounded-[2rem] p-8 text-center space-y-6">
            <h2 class="text-xl font-black uppercase tracking-widest">Share this memory?</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="finalize('Me')" class="p-5 bg-teal-500/20 rounded-2xl font-bold">Only for Me 🧑‍🚀</button>
                <button onclick="finalize('Friend')" class="p-5 bg-purple-500/20 rounded-2xl font-bold">For my Friend 👱‍♀️</button>
                <button onclick="finalize('Both')" class="p-5 bg-rose-500/20 rounded-2xl font-bold">For Both of Us 👩‍❤️‍👨</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI", authDomain: "clickandcollect-6c5d4.firebaseapp.com", databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "clickandcollect-6c5d4", storageBucket: "clickandcollect-6c5d4.firebasestorage.app", messagingSenderId: "739076323619", appId: "1:739076323619:web:9f75d0012923c0b44bb496", measurementId: "G-8V0CJ0ZJVM" };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pin = sessionStorage.getItem('cc_room_pin');

        // Har browser/user ke liye unique ID generate karo agar nahi hai toh
        if (!sessionStorage.getItem('cc_user_id')) {
            sessionStorage.setItem('cc_user_id', 'user_' + Math.random().toString(36).substr(2, 9));
        }
        const myUserId = sessionStorage.getItem('cc_user_id');

        window.finalize = async function(choice) {
            const sessionMemories = window.sessionMemories;
            const dbRequest = indexedDB.open('CC_Memories_DB', 1);
            
            dbRequest.onupgradeneeded = (e) => e.target.result.createObjectStore('memories', { keyPath: 'id' });
            
            dbRequest.onsuccess = async (e) => {
                const store = e.target.result.transaction('memories', 'readwrite').objectStore('memories');
                
                for (let m of sessionMemories) {
                    const uniqueTimestamp = Date.now() + Math.floor(Math.random() * 1000);
                    
                    // 1. Cloud Sync with Sender ID
                    push(ref(db, 'rooms/' + pin + '/memories'), {
                        url: m.image,
                        tag: choice,
                        time: m.time,
                        timestamp: uniqueTimestamp,
                        sender: myUserId
                    });

                    // 2. Local Save with Sender ID
                    store.add({ 
                        id: uniqueTimestamp, 
                        image: m.image, 
                        time: m.time, 
                        tag: choice,
                        sender: myUserId 
                    });
                }
                window.location.href = 'timeline.html';
            };
        };
    </script>

    <script>
        window.sessionMemories = [];
        async function startCamera() { 
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); 
                document.getElementById('video').srcObject = s; 
            } catch(e) { console.error(e); }
        }
        startCamera();
        function takePhoto() {
            const v = document.getElementById('video'); 
            const c = document.createElement('canvas'); 
            c.width = v.videoWidth; c.height = v.videoHeight; 
            c.getContext('2d').drawImage(v, 0, 0);
            const img = c.toDataURL('image/jpeg'); 
            window.sessionMemories.push({ image: img, time: new Date().toLocaleTimeString() });
            document.getElementById('preview-strip').innerHTML += `<img src="${img}" class="w-16 h-16 rounded-2xl object-cover">`;
            document.getElementById('collect-btn').classList.remove('hidden');
        }
        function showCollector() { document.getElementById('collector-modal').classList.remove('hidden'); }
    </script>
</body>
</html>
