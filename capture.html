<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&C - Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior: none; }

        .glass-dark { 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12); 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-start { scroll-snap-align: start; }
        
        @keyframes flashAnim { 0% { opacity: 0; } 50% { opacity: 0.9; } 100% { opacity: 0; } }
        .flash-active { animation: flashAnim 0.3s ease-out; }

        /* Video element mirroring when front camera */
        .mirror { transform: scaleX(-1); }

        /* Floating PIP Box */
        .pip-box {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .pip-box.minimized {
            width: 44px !important;
            height: 44px !important;
            border-radius: 50% !important;
        }
        .pip-box.minimized .pip-hide-on-min { display: none !important; }
        .pip-box.minimized .pip-min-icon { display: flex !important; }
    </style>
</head>
<body class="h-full bg-black text-white p-4 overflow-hidden relative select-none">

    <!-- Global Loader -->
    <div id="loader" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[100]">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-400"></div>
    </div>
    
    <div id="page-loader" class="hidden">
        <img src="/assets/loader.svg" alt="Loading...">
    </div>

    <!-- Top Counter HUD -->
    <div class="absolute top-6 left-0 right-0 z-40 text-center px-4 pointer-events-none">
        <div id="live-counter" class="inline-flex items-center gap-2 bg-black/60 px-4 py-1.5 rounded-full backdrop-blur-md text-[10px] font-black text-white/80 uppercase tracking-widest border border-white/10 hidden">
            <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
            Friend captured <span id="friend-count" class="text-teal-400 font-extrabold">0</span> photos
        </div>
        <div class="mt-2 text-[10px] font-extrabold text-teal-400/90 tracking-wider uppercase bg-black/40 inline-block px-3 py-1 rounded-full border border-teal-500/20">
            My Session: <span id="my-count" class="text-white">0</span>
        </div>
    </div>

    <!-- Main Local Camera Video Feed -->
    <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover mirror"></video>
    
    <!-- Flash Effect Layer -->
    <div id="flash" class="absolute inset-0 bg-white opacity-0 z-50 pointer-events-none"></div>

    <!-- WhatsApp Style Live Friend Preview Box (PIP) -->
    <div id="pip-box" class="pip-box absolute bottom-44 right-4 z-40 w-28 h-40 rounded-2xl glass-dark overflow-hidden border border-white/20 shadow-2xl">
        
        <!-- Live Remote Stream Content -->
        <div class="pip-hide-on-min relative w-full h-full bg-black/60">
            <video id="remote-video" class="w-full h-full object-cover" autoplay playsinline></video>
            
            <!-- Friend Offline Overlay -->
            <div id="remote-offline" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center p-2 text-center">
                <i class="fas fa-user-slash text-slate-500 text-sm mb-1"></i>
                <span class="text-[9px] text-slate-400 font-bold leading-tight">Friend Offline</span>
            </div>

            <!-- Minimize Button -->
            <button onclick="togglePip()" class="absolute top-1.5 right-1.5 w-5 h-5 rounded-full bg-black/60 text-white flex items-center justify-center text-[9px] border border-white/20 z-10">
                <i id="pip-icon" class="fas fa-minus"></i>
            </button>

            <!-- Live Status Tag -->
            <div class="absolute bottom-1.5 left-1.5 bg-black/70 backdrop-blur-md px-1.5 py-0.5 rounded-md text-[8px] font-extrabold text-teal-300 border border-teal-500/30 uppercase tracking-wider">
                <i class="fas fa-circle text-[5px] text-teal-400 mr-1 animate-pulse"></i>Friend Live
            </div>
        </div>

        <!-- Minimized Icon view -->
        <div onclick="togglePip()" class="pip-min-icon hidden w-full h-full items-center justify-center text-teal-400 text-base cursor-pointer bg-slate-900 border border-teal-500/40">
            <i class="fas fa-video"></i>
        </div>
    </div>

    <!-- Bottom Action Controls -->
    <div class="absolute bottom-6 left-0 right-0 px-6 z-40 max-w-md mx-auto">
        <!-- Photo Preview Strip -->
        <div id="preview-strip" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide snap-x"></div>

        <!-- Shutter Bar -->
        <div class="flex justify-between items-center glass-dark p-3.5 rounded-3xl border border-white/10 shadow-2xl">
            <!-- Camera Switch Button -->
            <button onclick="switchCamera()" class="w-12 h-12 bg-white/10 hover:bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md active:scale-90 transition-all border border-white/10 text-white">
                <i class="fas fa-camera-rotate text-lg"></i>
            </button>

            <!-- Shutter Snap Button -->
            <button onclick="takePhoto()" class="w-16 h-16 bg-white rounded-full border-4 border-slate-900/30 flex items-center justify-center active:scale-90 transition-all shadow-lg">
                <div class="w-12 h-12 rounded-full bg-teal-500 border border-white/40"></div>
            </button>

            <!-- Collect Button -->
            <button id="collect-btn" onclick="showCollector()" class="hidden bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 font-black text-xs px-5 py-3.5 rounded-2xl shadow-lg tracking-wider animate-bounce">
                COLLECT
            </button>
        </div>
    </div>

    <!-- Collector Modal -->
    <div id="collector-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50 backdrop-blur-md">
        <div class="glass-dark w-full max-w-sm rounded-[2.5rem] p-7 text-center space-y-6 relative border border-white/15">
            <button onclick="document.getElementById('collector-modal').classList.add('hidden')" class="absolute top-5 right-5 text-white/50 hover:text-white p-2">
                <i class="fas fa-xmark text-lg"></i>
            </button>
            
            <div class="space-y-1">
                <h2 class="text-base font-extrabold uppercase tracking-widest text-teal-400">Where to send?</h2>
                <p class="text-[11px] text-slate-400 font-medium">Choose who gets to see this session's photos</p>
            </div>

            <div class="space-y-3 pt-2">
                <button onclick="finalize('Me')" class="w-full p-4 bg-teal-500/10 hover:bg-teal-500/20 border border-teal-500/30 rounded-2xl text-left transition-all active:scale-95 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-teal-500/20 flex items-center justify-center text-teal-400 text-base"><i class="fas fa-user"></i></div>
                    <div>
                        <div class="font-bold text-teal-400 text-sm">Only for Me</div>
                        <div class="text-[10px] text-teal-200/60 font-medium">Saves to your feed only</div>
                    </div>
                </button>

                <button onclick="finalize('Friend')" class="w-full p-4 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 rounded-2xl text-left transition-all active:scale-95 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center text-purple-400 text-base"><i class="fas fa-user-group"></i></div>
                    <div>
                        <div class="font-bold text-purple-400 text-sm">For my Friend</div>
                        <div class="text-[10px] text-purple-200/60 font-medium">Sends directly to friend's feed</div>
                    </div>
                </button>

                <button onclick="finalize('Both')" class="w-full p-4 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 rounded-2xl text-left transition-all active:scale-95 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-rose-500/20 flex items-center justify-center text-rose-400 text-base"><i class="fas fa-heart"></i></div>
                    <div>
                        <div class="font-bold text-rose-400 text-sm">For Both of Us</div>
                        <div class="text-[10px] text-rose-200/60 font-medium">Visible on both timelines</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase & Live WebRTC Stream Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, onDisconnect, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI", authDomain: "clickandcollect-6c5d4.firebaseapp.com", databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "clickandcollect-6c5d4", storageBucket: "clickandcollect-6c5d4.firebasestorage.app", messagingSenderId: "739076323619", appId: "1:739076323619:web:9f75d0012923c0b44bb496", measurementId: "G-8V0CJ0ZJVM" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const pin = localStorage.getItem('cc_room_pin');
        const myUserId = localStorage.getItem('cc_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('cc_user_id', myUserId);

        let peerConnection = null;
        let videoSender = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        if (pin) {
            // 1. Realtime Friend Photo Counter
            onValue(ref(db, 'rooms/' + pin + '/memories'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const friendPhotos = Object.values(data).filter(m => m.sender !== myUserId);
                    if (friendPhotos.length > 0) {
                        document.getElementById('live-counter').classList.remove('hidden');
                        document.getElementById('friend-count').textContent = friendPhotos.length;
                    }
                }
            });

            // 2. WebRTC Live Video Connection Initializer
            window.setupLiveStream = async function() {
                if (!window.localStream) return;

                peerConnection = new RTCPeerConnection(rtcConfig);

                // Add local camera tracks to peer connection
                window.localStream.getTracks().forEach(track => {
                    if (track.kind === 'video') {
                        videoSender = peerConnection.addTrack(track, window.localStream);
                    } else {
                        peerConnection.addTrack(track, window.localStream);
                    }
                });

                window.peerVideoSender = videoSender;

                // Handle incoming live remote video track
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remote-video');
                    remoteVideo.srcObject = event.streams[0];
                    document.getElementById('remote-offline').classList.add('hidden');
                };

                // Send ICE Candidates to Firebase
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        push(ref(db, `rooms/${pin}/candidates/${myUserId}`), event.candidate.toJSON());
                    }
                };

                // Track online presence
                const myPresenceRef = ref(db, `rooms/${pin}/users/${myUserId}`);
                set(myPresenceRef, true);
                onDisconnect(myPresenceRef).remove();

                // Listen for room users to trigger WebRTC signaling
                onValue(ref(db, `rooms/${pin}/users`), async (snapshot) => {
                    const users = snapshot.val() || {};
                    const otherUsers = Object.keys(users).filter(id => id !== myUserId);

                    if (otherUsers.length > 0) {
                        const otherId = otherUsers[0];

                        // Caller Logic (Lexicographically smaller ID acts as offerer)
                        if (myUserId < otherId && peerConnection.signalingState === "stable") {
                            const offer = await peerConnection.createOffer();
                            await peerConnection.setLocalDescription(offer);
                            set(ref(db, `rooms/${pin}/offers/${myUserId}_${otherId}`), {
                                sdp: offer.sdp,
                                type: offer.type
                            });
                        }
                    } else {
                        document.getElementById('remote-offline').classList.remove('hidden');
                    }
                });

                // Listen for incoming WebRTC Offers
                onValue(ref(db, `rooms/${pin}/offers`), async (snapshot) => {
                    const offers = snapshot.val();
                    if (!offers) return;

                    for (let key in offers) {
                        if (key.endsWith(`_${myUserId}`)) {
                            const offer = offers[key];
                            if (peerConnection.signalingState === "stable") {
                                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                                const answer = await peerConnection.createAnswer();
                                await peerConnection.setLocalDescription(answer);
                                set(ref(db, `rooms/${pin}/answers/${key}`), {
                                    sdp: answer.sdp,
                                    type: answer.type
                                });
                            }
                        }
                    }
                });

                // Listen for incoming WebRTC Answers
                onValue(ref(db, `rooms/${pin}/answers`), async (snapshot) => {
                    const answers = snapshot.val();
                    if (!answers) return;

                    for (let key in answers) {
                        if (key.startsWith(`${myUserId}_`)) {
                            const answer = answers[key];
                            if (peerConnection.signalingState === "have-local-offer") {
                                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                            }
                        }
                    }
                });

                // Listen for ICE Candidates
                onChildAdded(ref(db, `rooms/${pin}/candidates`), (snapshot) => {
                    const peerId = snapshot.key;
                    if (peerId !== myUserId) {
                        onChildAdded(ref(db, `rooms/${pin}/candidates/${peerId}`), (candSnap) => {
                            const candidate = candSnap.val();
                            if (candidate && peerConnection) {
                                peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(() => {});
                            }
                        });
                    }
                });
            };

            // Auto-trigger signaling if camera is ready
            if (window.localStream) {
                window.setupLiveStream();
            }
        }

        window.finalize = async function(choice) {
            if (!navigator.onLine && (choice === 'Friend' || choice === 'Both')) { alert("Internet connection nahi hai!"); return; }
            document.getElementById('loader').classList.remove('hidden');
            const dbRequest = indexedDB.open('CC_Memories_DB', 1);
            dbRequest.onupgradeneeded = (e) => e.target.result.createObjectStore('memories', { keyPath: 'id' });
            dbRequest.onsuccess = async (e) => {
                const store = e.target.result.transaction('memories', 'readwrite').objectStore('memories');
                for (let m of window.sessionMemories) {
                    const uniqueId = Date.now() + Math.floor(Math.random() * 1000);
                    if (choice === 'Me' || choice === 'Both') store.add({ id: uniqueId, image: m.image, time: m.time, tag: choice, sender: myUserId });
                    if (choice === 'Friend' || choice === 'Both') push(ref(db, 'rooms/' + pin + '/memories'), { url: m.image, tag: choice, time: m.time, sender: myUserId });
                }
                window.location.href = 'timeline.html';
            };
        };
    </script>

    <!-- Camera & UI Handler Script -->
    <script>
        window.sessionMemories = [];
        let currentFacingMode = "user"; // Start with front camera
        const video = document.getElementById('video');

        async function startCamera() { 
            try { 
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                }); 

                video.srcObject = s; 
                window.localStream = s;
                
                // Mirror effect for front camera only
                if (currentFacingMode === "user") {
                    video.classList.add('mirror');
                } else {
                    video.classList.remove('mirror');
                }

                // Update track if WebRTC live stream is active
                if (window.peerVideoSender && s.getVideoTracks().length > 0) {
                    window.peerVideoSender.replaceTrack(s.getVideoTracks()[0]);
                } else if (window.setupLiveStream) {
                    window.setupLiveStream();
                }
            } catch(e) { 
                alert("Camera access needed!"); 
            } 
        }
        startCamera();

        function switchCamera() { 
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; 
            startCamera(); 
        }

        function togglePip() {
            const pip = document.getElementById('pip-box');
            pip.classList.toggle('minimized');
        }
        
        function takePhoto() {
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 300);

            const c = document.createElement('canvas'); 
            c.width = video.videoWidth || 1280; 
            c.height = video.videoHeight || 720; 
            const ctx = c.getContext('2d');

            // Flip canvas horizontally if front camera is used
            if (currentFacingMode === "user") {
                ctx.translate(c.width, 0);
                ctx.scale(-1, 1);
            }

            ctx.drawImage(video, 0, 0, c.width, c.height);
            const img = c.toDataURL('image/jpeg', 0.85); 
            const photoId = Date.now();
            
            window.sessionMemories.push({ id: photoId, image: img, time: Date.now() });
            
            document.getElementById('my-count').textContent = window.sessionMemories.length;
            document.getElementById('preview-strip').innerHTML += `
                <div class="relative snap-start flex-shrink-0" id="photo-${photoId}">
                    <img src="${img}" class="w-16 h-16 rounded-2xl object-cover border-2 border-white/30 shadow-md">
                    <button onclick="removePhoto(${photoId})" class="absolute -top-1 -right-1 bg-rose-500 hover:bg-rose-600 text-white rounded-full w-5 h-5 text-[10px] font-black flex items-center justify-center shadow-md">×</button>
                </div>`;
            
            document.getElementById('collect-btn').classList.remove('hidden');
        }

        function removePhoto(id) {
            window.sessionMemories = window.sessionMemories.filter(m => m.id !== id);
            const elem = document.getElementById(`photo-${id}`);
            if (elem) elem.remove();
            document.getElementById('my-count').textContent = window.sessionMemories.length;
            if (window.sessionMemories.length === 0) document.getElementById('collect-btn').classList.add('hidden');
        }

        // Tap visual indicator effect
        window.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('#collector-modal')) return;
            const ind = document.createElement('div');
            ind.className = 'fixed w-10 h-10 border-2 border-teal-400/80 rounded-full pointer-events-none animate-ping z-30';
            ind.style.left = (e.clientX - 20) + 'px'; 
            ind.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(ind); 
            setTimeout(() => ind.remove(), 400);
        });

        function showCollector() { 
            document.getElementById('collector-modal').classList.remove('hidden'); 
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
