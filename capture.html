<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C - Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-dark { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-start { scroll-snap-align: start; }
        
        /* Shutter flash */
        @keyframes flashAnim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .flash-active { animation: flashAnim 0.3s ease-out; }
    </style>
</head>
<body class="h-full bg-black text-white p-4 overflow-hidden">

    <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
    
    <div id="flash" class="absolute inset-0 bg-white opacity-0 z-50 pointer-events-none"></div>

    <div class="absolute bottom-10 left-0 right-0 px-6 z-40">
        <div id="preview-strip" class="flex gap-4 overflow-x-auto pb-6 scrollbar-hide snap-x">
            </div>

        <div class="flex justify-between items-center bg-black/50 p-4 rounded-3xl backdrop-blur-md border border-white/10">
            <div class="w-16"></div> <button onclick="takePhoto()" class="w-16 h-16 bg-white rounded-full border-4 border-white/20 active:scale-90 transition-all"></button>
            <button id="collect-btn" onclick="showCollector()" class="hidden bg-teal-500 px-6 py-3 rounded-2xl font-black text-xs animate-bounce">COLLECT</button>
        </div>
    </div>

    <div id="collector-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50 backdrop-blur-md">
        <div class="glass-dark w-full max-w-sm rounded-[2.5rem] p-8 text-center space-y-6">
            <h2 class="text-lg font-black uppercase tracking-widest text-white/50">Where to send?</h2>
            
            <div class="space-y-4">
                <button onclick="finalize('Me')" class="w-full p-4 bg-teal-500/10 hover:bg-teal-500/20 border border-teal-500/30 rounded-2xl text-left transition">
                    <div class="font-bold text-teal-400">🧑‍🚀 Only for Me</div>
                    <div class="text-[10px] text-teal-400/60">Saved locally to your private timeline.</div>
                </button>
                
                <button onclick="finalize('Friend')" class="w-full p-4 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 rounded-2xl text-left transition">
                    <div class="font-bold text-purple-400">👱‍♀️ For my Friend</div>
                    <div class="text-[10px] text-purple-400/60">Sent to their device. Hidden from yours.</div>
                </button>
                
                <button onclick="finalize('Both')" class="w-full p-4 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 rounded-2xl text-left transition">
                    <div class="font-bold text-rose-400">👩‍❤️‍👨 For Both of Us</div>
                    <div class="text-[10px] text-rose-400/60">Synced to both timelines instantly.</div>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDJRuqOFaKxEkzMHAYM9eIKwX3dzEzisrI",
          authDomain: "clickandcollect-6c5d4.firebaseapp.com",
          databaseURL: "https://clickandcollect-6c5d4-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "clickandcollect-6c5d4",
          storageBucket: "clickandcollect-6c5d4.firebasestorage.app",
          messagingSenderId: "739076323619",
          appId: "1:739076323619:web:9f75d0012923c0b44bb496",
          measurementId: "G-8V0CJ0ZJVM"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Ensure Pin exists
        const pin = sessionStorage.getItem('cc_room_pin');
        const myUserId = sessionStorage.getItem('cc_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
        sessionStorage.setItem('cc_user_id', myUserId);

        window.finalize = async function(choice) {
            const sessionMemories = window.sessionMemories;
            if (sessionMemories.length === 0) return;

            const dbRequest = indexedDB.open('CC_Memories_DB', 1);
            dbRequest.onupgradeneeded = (e) => e.target.result.createObjectStore('memories', { keyPath: 'id' });
            
            dbRequest.onsuccess = async (e) => {
                // FIXED: Rename this variable to localDB so it doesn't shadow the Firebase 'db'
                const localDB = e.target.result; 
                const transaction = localDB.transaction('memories', 'readwrite');
                const store = transaction.objectStore('memories');
                
                for (let m of sessionMemories) {
                    const uniqueId = Date.now() + Math.floor(Math.random() * 1000);

                    // LOGIC: Me or Both -> Save Locally
                    if (choice === 'Me' || choice === 'Both') {
                        store.add({ id: uniqueId, image: m.image, time: m.time, tag: choice, sender: myUserId });
                    }

                    // LOGIC: Friend or Both -> Send to Firebase
                    if (choice === 'Friend' || choice === 'Both') {
                        // This now correctly uses the global 'db' (Firebase)
                        push(ref(db, 'rooms/' + pin + '/memories'), {
                            url: m.image,
                            tag: choice,
                            time: m.time,
                            sender: myUserId
                        });
                    }
                }
                window.location.href = 'timeline.html';
            };
        };
    </script>

    <script>
        window.sessionMemories = [];
        const video = document.getElementById('video');

        async function startCamera() { 
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); 
                video.srcObject = s; 
            } catch(e) { console.error(e); }
        }
        startCamera();

        function takePhoto() {
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 300);

            const c = document.createElement('canvas'); 
            c.width = video.videoWidth; 
            c.height = video.videoHeight; 
            c.getContext('2d').drawImage(video, 0, 0);
            const img = c.toDataURL('image/jpeg'); 
            
            const photoId = Date.now();
            window.sessionMemories.push({ id: photoId, image: img, time: new Date().toLocaleTimeString() });
            
            const strip = document.getElementById('preview-strip');
            strip.innerHTML += `
                <div class="relative snap-start flex-shrink-0" id="photo-${photoId}">
                    <img src="${img}" class="w-16 h-16 rounded-xl object-cover border-2 border-white/20">
                    <button onclick="removePhoto(${photoId})" class="absolute -top-1 -right-1 bg-red-500 rounded-full w-5 h-5 text-[10px] font-bold">×</button>
                </div>
            `;
            document.getElementById('collect-btn').classList.remove('hidden');
        }

        function removePhoto(id) {
            window.sessionMemories = window.sessionMemories.filter(m => m.id !== id);
            document.getElementById(`photo-${id}`).remove();
            if (window.sessionMemories.length === 0) document.getElementById('collect-btn').classList.add('hidden');
        }

        function showCollector() { document.getElementById('collector-modal').classList.remove('hidden'); }
    </script>
</body>
</html>
